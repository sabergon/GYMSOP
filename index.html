<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NutriGym">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0b" id="theme-meta">
<title>NutriGym</title>
<script>
const mf={name:"NutriGym",short_name:"NutriGym",start_url:"./",display:"standalone",background_color:"#0a0a0b",theme_color:"#0a0a0b",icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%230a0a0b'/><text y='140' x='20' font-size='140'>🏋️</text></svg>",sizes:"192x192",type:"image/svg+xml"}]};
const mb=new Blob([JSON.stringify(mf)],{type:'application/json'});
document.write('<link rel="manifest" href="'+URL.createObjectURL(mb)+'">');
</script>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230a0a0b'/><text y='130' x='15' font-size='130'>🥗</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{
  --bg:#0a0a0b;--surface:#0f0f11;--s2:#16161a;--s3:#1d1d22;
  --line:#222228;--line2:#2d2d35;
  --tx:#f4f4f5;--tx2:#a1a1aa;--tx3:#71717a;--tx4:#52525b;
  --lime:oklch(0.88 0.22 130);--lime-dim:oklch(0.65 0.18 130);--lime-ink:oklch(0.25 0.12 130);
  --coral:oklch(0.72 0.22 25);--amber:oklch(0.80 0.18 75);
  --sky:oklch(0.80 0.16 230);--mag:oklch(0.72 0.22 350);
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
[data-theme="light"]{
  --bg:#f8f8fb;--surface:#ffffff;--s2:#f1f1f5;--s3:#e4e4e9;
  --line:#e1e1e6;--line2:#cfcfd5;
  --tx:#0a0a0b;--tx2:#52525b;--tx3:#71717a;--tx4:#a1a1aa;
  --lime:oklch(0.62 0.22 130);--lime-dim:oklch(0.48 0.18 130);--lime-ink:#ffffff;
  --coral:oklch(0.55 0.22 25);--amber:oklch(0.58 0.18 75);
  --sky:oklch(0.50 0.16 230);--mag:oklch(0.55 0.22 350);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Geist',system-ui,sans-serif;color:var(--tx);-webkit-font-smoothing:antialiased}
body{max-width:430px;margin:0 auto;display:flex;flex-direction:column}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.4}
::-webkit-scrollbar{display:none}
.mono{font-family:'Geist Mono',monospace;font-variant-numeric:tabular-nums}

/* ── HEADER ── */
#hdr{background:var(--bg);padding:calc(var(--st) + 8px) 20px 12px;flex-shrink:0;border-bottom:1px solid var(--line)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.hdr-nav{width:36px;height:36px;border-radius:10px;background:var(--s2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--tx2);cursor:pointer;flex-shrink:0}
.hdr-nav svg{width:16px;height:16px}
.hdr-center{text-align:center;flex:1;padding:0 8px}
.hdr-eyebrow{font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);margin-bottom:3px}
.hdr-title{font-size:20px;font-weight:700;letter-spacing:-.02em;line-height:1.1}
.hdr-title b{color:var(--lime)}
.hdr-chips{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;background:var(--s2);border:1px solid var(--line);font-size:10px;color:var(--tx2);font-weight:500}
.chip.lime{color:var(--lime);border-color:color-mix(in oklch,var(--lime) 30%,transparent);background:color-mix(in oklch,var(--lime) 8%,transparent)}
.chip.mag{color:var(--mag);border-color:color-mix(in oklch,var(--mag) 30%,transparent);background:color-mix(in oklch,var(--mag) 8%,transparent)}
.chip.sky{color:var(--sky);border-color:color-mix(in oklch,var(--sky) 30%,transparent);background:color-mix(in oklch,var(--sky) 8%,transparent)}
.chip .dot-sm{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ── TABS TOP ── */
#tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--line);flex-shrink:0;overflow-x:auto;padding:4px 8px 6px;gap:2px}
.tab{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 8px;border-radius:10px;cursor:pointer;color:var(--tx4);min-width:48px;border:none;background:none;font-family:inherit}
.tab svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.tab .tlbl{font-size:7.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.tab.on{color:var(--lime)}

/* ── SCROLL ── */
#scr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px calc(var(--sb) + 14px);display:flex;flex-direction:column;gap:12px}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);font-weight:600;display:flex;align-items:center;gap:5px}
.card-title svg{width:11px;height:11px}
.card-sub{font-size:11px;color:var(--tx3);font-family:'Geist Mono',monospace}
.s2{background:var(--s2)}

/* ── HERO CALORIE ── */
.hero{background:linear-gradient(160deg,var(--surface),var(--s2));border:1px solid var(--line);border-radius:20px;padding:18px;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,color-mix(in oklch,var(--lime) 15%,transparent) 0%,transparent 70%);pointer-events:none}
.hero-row{display:flex;justify-content:space-between;align-items:flex-end;position:relative;margin-bottom:14px}
.hero-cell{display:flex;flex-direction:column;gap:3px}
.hero-cell .l{font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);font-weight:600}
.hero-cell .v{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.hero-cell .v.big{font-size:36px;color:var(--lime)}
.hero-cell .v.coral{color:var(--coral)}

/* ── BARS ── */
.bar{height:5px;border-radius:999px;background:var(--s3);overflow:hidden}
.bar-fill{height:100%;border-radius:999px;background:var(--lime);transition:width .5s cubic-bezier(.4,0,.2,1)}
.bar-fill.coral{background:var(--coral)}.bar-fill.amber{background:var(--amber)}.bar-fill.sky{background:var(--sky)}.bar-fill.mag{background:var(--mag)}
.bar-track-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.bar-label{font-size:12px;color:var(--tx2);font-weight:500}
.bar-val{font-size:12px;color:var(--tx);font-weight:600;font-variant-numeric:tabular-nums}
.bar-val span{color:var(--tx4);font-weight:400}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* ── STATS ── */
.stat{background:var(--s2);border:1px solid var(--line);border-radius:14px;padding:12px}
.stat .k{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-weight:600}
.stat .v{font-size:20px;font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1}
.stat .s{font-size:10px;color:var(--tx4);margin-top:3px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:9px;font-weight:700;font-family:'Geist Mono',monospace;letter-spacing:.03em;text-transform:uppercase}
.badge.good{background:color-mix(in oklch,var(--lime) 12%,transparent);color:var(--lime);border:1px solid color-mix(in oklch,var(--lime) 25%,transparent)}
.badge.bad{background:color-mix(in oklch,var(--coral) 12%,transparent);color:var(--coral);border:1px solid color-mix(in oklch,var(--coral) 25%,transparent)}
.badge.neu{background:var(--s2);color:var(--tx2);border:1px solid var(--line)}
.badge.warn{background:color-mix(in oklch,var(--amber) 12%,transparent);color:var(--amber);border:1px solid color-mix(in oklch,var(--amber) 25%,transparent)}

/* ── BUTTONS ── */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:12px 16px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:var(--s2);color:var(--tx);font-family:inherit;width:100%}
.btn.primary{background:var(--lime);color:var(--lime-ink);border-color:var(--lime)}
.btn.ghost{background:transparent;color:var(--tx2)}
.btn.danger{color:var(--coral);border-color:color-mix(in oklch,var(--coral) 25%,transparent)}
.btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* ── ROWS ── */
.row{display:flex;align-items:center;gap:12px;padding:10px 0}
.row+.row{border-top:1px solid var(--line)}
.row .ico{width:34px;height:34px;border-radius:9px;background:var(--s2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.row .ico svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.row .body{flex:1;min-width:0}
.row .name{font-size:13px;font-weight:500}
.row .meta{font-size:10px;color:var(--tx3);font-family:'Geist Mono',monospace;margin-top:1px}
.row .num{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}
.rmv{background:none;border:none;color:var(--tx4);cursor:pointer;font-size:13px;padding:4px;flex-shrink:0}

/* ── INPUTS ── */
.inp{width:100%;background:var(--s2);border:1px solid var(--line);border-radius:12px;padding:11px 14px;color:var(--tx);font-size:13px;font-family:inherit;outline:none;margin-bottom:8px}
.inp:focus{border-color:var(--lime-dim)}
.sel{width:100%;background:var(--s2);border:1px solid var(--line);border-radius:12px;padding:11px 14px;color:var(--tx);font-size:13px;font-family:inherit;outline:none;margin-bottom:8px;-webkit-appearance:none}
.ta{width:100%;background:var(--s2);border:1px solid var(--line);border-radius:12px;padding:11px 14px;color:var(--tx);font-size:13px;font-family:inherit;outline:none;resize:none;line-height:1.5;margin-bottom:8px}
.inp:focus,.sel:focus,.ta:focus{border-color:var(--lime-dim)}
.qb{background:var(--s2);border:1px solid var(--line);border-radius:8px;color:var(--tx);width:34px;height:34px;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:inherit}
.qi{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:4px 6px;color:var(--tx);font-size:15px;text-align:center;outline:none;font-family:inherit;width:64px}
.qi:focus{border-color:var(--lime-dim)}

/* ── FOOD CAT PILLS ── */
.cat-row{display:flex;gap:6px;overflow-x:auto;padding:2px 0 4px}
.cat{flex-shrink:0;padding:6px 12px;border-radius:999px;background:var(--s2);border:1px solid var(--line);font-size:11px;font-weight:600;color:var(--tx3);cursor:pointer;white-space:nowrap}
.cat.on{background:var(--lime);color:var(--lime-ink);border-color:var(--lime)}

/* ── FOOD DROP ── */
.drop{background:var(--s2);border:1px solid var(--line);border-radius:12px;overflow:hidden;max-height:220px;overflow-y:auto;margin-top:4px}
.drow{padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line)}
.drow:last-child{border-bottom:none}
.drow:active{background:var(--s3)}
.food-sel{background:var(--s2);border:1px solid var(--lime-dim);border-radius:14px;padding:14px;margin-top:6px;animation:fadeUp .2s ease}

/* ── UNIT BUTTONS ── */
.ubtn{background:var(--s2);border:1px solid var(--line);border-radius:8px;padding:5px 10px;color:var(--tx3);font-size:11px;cursor:pointer;font-family:inherit;font-weight:500}
.ubtn.on{background:color-mix(in oklch,var(--lime) 10%,transparent);border-color:var(--lime-dim);color:var(--lime)}

/* ── WATER BTNS ── */
.water-btn{background:var(--s2);border:1px solid var(--line);border-radius:14px;padding:12px;display:flex;align-items:center;gap:10px;cursor:pointer}
.water-btn:active{background:var(--s3)}
.w-ico{width:32px;height:32px;border-radius:8px;background:color-mix(in oklch,var(--sky) 10%,transparent);border:1px solid color-mix(in oklch,var(--sky) 25%,transparent);display:flex;align-items:center;justify-content:center;color:var(--sky);flex-shrink:0}
.w-ico svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.w-l{font-size:12px;font-weight:600}
.w-s{font-size:10px;color:var(--tx3);font-family:'Geist Mono',monospace;margin-top:1px}

/* ── DOT ROW (water) ── */
.dot-row{display:flex;gap:3px}
.dot-row .d{flex:1;height:5px;border-radius:3px;background:var(--s3)}
.dot-row .d.on{background:var(--sky)}
.dot-row .d.over{background:var(--lime)}

/* ── EXERCISE CARDS ── */
.excard{background:var(--s2);border:1px solid var(--line);border-radius:14px;padding:12px;cursor:pointer;position:relative;transition:border-color .15s}
.excard:active{border-color:var(--lime-dim)}

/* ── MOOD ── */
.mood-row{display:flex;justify-content:space-between;gap:6px}
.mood{flex:1;aspect-ratio:1;border-radius:12px;background:var(--s2);border:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--tx3)}
.mood svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.75}
.mood .ml{font-size:7.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.mood.on{border-color:var(--lime);color:var(--lime);background:color-mix(in oklch,var(--lime) 6%,transparent)}

/* ── TIP ROW ── */
.tip{display:flex;gap:10px;padding:9px 0}
.tip+.tip{border-top:1px solid var(--line)}
.tip .dot-xs{width:5px;height:5px;border-radius:50%;background:var(--lime);margin-top:5px;flex-shrink:0}
.tip .t{font-size:12px;color:var(--tx2);line-height:1.55}

/* ── PHASE CARD ── */
.phase-card{border-radius:18px;padding:16px;background:linear-gradient(135deg,color-mix(in oklch,var(--mag) 12%,transparent),color-mix(in oklch,var(--mag) 2%,transparent));border:1px solid color-mix(in oklch,var(--mag) 25%,transparent)}

/* ── MEASURE ROW ── */
.meas{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
.meas+.meas{border-top:1px solid var(--line)}
.meas-k{font-size:12px;color:var(--tx2)}
.meas-v{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}
.delta{font-size:9px;margin-left:5px;font-family:'Geist Mono',monospace}
.delta.up{color:var(--coral)}.delta.down{color:var(--lime)}

/* ── SEGMENTED ── */
.seg{display:flex;background:var(--s2);border:1px solid var(--line);border-radius:12px;padding:3px;gap:2px}
.seg-item{flex:1;text-align:center;padding:8px 4px;font-size:10px;font-weight:600;color:var(--tx3);border-radius:9px;cursor:pointer;text-transform:uppercase;letter-spacing:.04em}
.seg-item.on{background:var(--s3);color:var(--tx)}

/* ── CHALLENGE ── */
.challenge-card{background:linear-gradient(135deg,color-mix(in oklch,var(--lime) 8%,transparent),color-mix(in oklch,var(--lime) 1%,transparent));border:1px solid color-mix(in oklch,var(--lime) 25%,transparent);border-radius:20px;padding:18px}

/* ── GOAL OPT ── */
.gopt{background:var(--s2);border:1px solid var(--line);border-radius:14px;padding:12px 14px;cursor:pointer;margin-bottom:8px}
.gopt.on{border-color:var(--lime-dim);background:color-mix(in oklch,var(--lime) 6%,transparent)}

/* ── STEPS CARD ── */
.steps-card{background:linear-gradient(160deg,color-mix(in oklch,var(--sky) 10%,var(--s2)),var(--s2));border:1px solid color-mix(in oklch,var(--sky) 20%,transparent);border-radius:18px;padding:16px}

/* ── FASTING ── */
.fast-card{background:linear-gradient(160deg,color-mix(in oklch,var(--amber) 8%,var(--s2)),var(--s2));border:1px solid color-mix(in oklch,var(--amber) 20%,transparent);border-radius:18px;padding:16px}
.fast-big{font-size:48px;font-weight:800;letter-spacing:-.04em;font-family:'Geist Mono',monospace;line-height:1}
.fast-big.active{color:var(--lime)}
.fast-big.eating{color:var(--amber)}

/* ── TOGGLE ── */
.tsw{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0}
.tsw input{opacity:0;width:0;height:0}
.tsl{position:absolute;cursor:pointer;inset:0;background:var(--s3);border-radius:24px;transition:.3s;border:1px solid var(--line)}
.tsl:before{position:absolute;content:"";height:18px;width:18px;left:2px;bottom:2px;background:var(--tx3);border-radius:50%;transition:.3s}
input:checked+.tsl{background:var(--lime);border-color:var(--lime)}
input:checked+.tsl:before{transform:translateX(20px);background:var(--lime-ink)}

/* ── AVATAR ── */
.avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--lime),var(--amber));color:var(--lime-ink);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;flex-shrink:0}

/* ── TOAST ── */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--s2);border:1px solid var(--line2);border-radius:20px;padding:9px 18px;font-size:12px;font-weight:600;z-index:300;color:var(--tx);box-shadow:0 12px 40px #0009;white-space:nowrap;max-width:90vw;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:#000000cc;display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0}
.modal{background:var(--s2);border-radius:24px 24px 0 0;padding:24px 20px calc(var(--sb) + 24px);width:100%;max-width:430px;display:flex;flex-direction:column;gap:12px;border:1px solid var(--line);max-height:90vh;overflow-y:auto;animation:slideUp .3s cubic-bezier(.32,0,.15,1)}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--line2);margin:0 auto 16px}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── INSTALL BANNER ── */
#install-banner{display:none;position:fixed;bottom:calc(var(--sb) + 12px);left:12px;right:12px;background:linear-gradient(135deg,var(--s2),var(--s3));border:1px solid var(--lime-dim);border-radius:16px;padding:14px 16px;z-index:100;box-shadow:0 8px 40px #0009}
.ibrow{display:flex;justify-content:space-between;align-items:center;gap:10px}
.ibbtn{background:var(--lime);border:none;border-radius:10px;padding:7px 14px;color:var(--lime-ink);font-weight:700;font-size:12px;cursor:pointer;font-family:inherit}
.ibcl{background:none;border:none;color:var(--tx3);font-size:18px;cursor:pointer}

/* ── SPARK BARS ── */
.spark{display:flex;align-items:flex-end;gap:3px;height:44px}
.spark .b{flex:1;border-radius:3px 3px 0 0;min-height:4px;background:var(--s3)}
.spark .b.on{background:var(--lime)}
.spark .b.over{background:var(--coral)}
.spark .b.today{background:var(--lime);box-shadow:0 0 8px color-mix(in oklch,var(--lime) 50%,transparent)}

/* ── BIG NUM ── */
.bignum{font-size:40px;font-weight:700;letter-spacing:-.04em;line-height:1;font-variant-numeric:tabular-nums}
.bignum .unit{font-size:13px;color:var(--tx3);margin-left:4px;font-weight:500}

/* ── EMPTY ── */
.empty{text-align:center;color:var(--tx3);padding:40px 20px;font-size:13px;line-height:2.5}

/* ── DIET BADGE ── */
.diet-opt{display:flex;align-items:center;gap:12px;padding:12px;background:var(--s2);border:1px solid var(--line);border-radius:12px;cursor:pointer;margin-bottom:8px}
.diet-opt.on{border-color:var(--lime-dim);background:color-mix(in oklch,var(--lime) 6%,transparent)}
.diet-ico{font-size:22px;width:36px;text-align:center;flex-shrink:0}

/* ── FAV STAR ── */
.fav-btn{background:none;border:none;cursor:pointer;color:var(--tx4);font-size:14px;padding:4px;flex-shrink:0}
.fav-btn.on{color:var(--amber)}
</style>
</head>

// ══════ UNIT FACTORS ══════
// Grams per unit - from food's own u array [[unit, grams], ...] or fallback
const GMAP={g:1,ml:1,unidad:100,"ración":200,"porción":150,lata:80,mazorca:150,rama:40,rebanada:30,cucharada:15,cucharadita:5,pizca:1,taza:240,vaso:250,plato:300,puñado:30,onza:28,copa:150,chupito:40,"caña":200,bola:75,botella:500,diente:3,hoja:3,bol:250};
// Get factor (grams/100) for qty of unit, using food-specific grams if available
function getF(qty,unit,food){
  // If food has u array with [[unit, grams_per_unit], ...], use specific grams
  if(food&&Array.isArray(food.u)){
    for(const pair of food.u){
      if(Array.isArray(pair)&&pair[0]===unit){
        return (unit==="g"||unit==="ml")?qty/100:qty*pair[1]/100;
      }
    }
  }
  const g=GMAP[unit]||100;
  return(unit==="g"||unit==="ml")?qty/100:qty*(g/100);
}
// Get default unit for food (first in u array, or 'g')
function getDefaultUnit(f){
  if(f&&Array.isArray(f.u)&&f.u.length){
    const first=f.u[0];
    return Array.isArray(first)?first[0]:first;
  }
  return "g";
}
// Get unit names for food
function getUnits(f){
  if(f&&Array.isArray(f.u)){
    return f.u.map(x=>Array.isArray(x)?x[0]:x);
  }
  return ["g"];
}
// Helper to get food's field with old/new field name support (backward compat)
function fn(food){return food.n||food.name||"?";}
function fp(food){return food.p!==undefined?food.p:(food.prot||0);}
function fc(food){return food.c!==undefined?food.c:(food.carbs||0);}
function ff(food){return food.f!==undefined?food.f:(food.fat||0);}
function ftags(food){return food.t||food.tags||[];}

// ══════ SMART TIPS ══════
function getSmartTips(){
  const t=totals(),cg=calGoal(),nc=t.cal-exCalBurned();
  const pg=Math.round(cg*.30/4);
  const tips=[];
  if(t.prot<pg*0.7)tips.push(`Te faltan ~${pg-t.prot}g de proteína para el objetivo de hoy`);
  if(nc>cg)tips.push(`Llevas ${nc-cg} kcal sobre el objetivo — ajusta la cena`);
  if(nc<cg*0.6&&DD.meals.length>0)tips.push(`Déficit excesivo hoy — comer poco puede ralentizar el metabolismo`);
  if((DD.water||0)<1000&&new Date().getHours()>14)tips.push(`Solo ${DD.water||0}ml de agua — bebe un vaso ahora`);
  const phase=currentPhase();
  if(phase){const tipText=PR.cycleType==="sop"?phase.sopTip:phase.tip;tips.push(tipText);}
  if(!tips.length){
    const def=isMale()?["Distribuye proteínas en 3-4 tomas para síntesis muscular","Hidratación: 35ml por kg de peso","7-8h de sueño = más testosterona y mejor recuperación"]:
    ["Combina proteína + carbos en cada comida (control insulina)","Bebe agua antes de comer → más saciedad","El sueño es el recovery más infrautilizado"];
    tips.push(...def.slice(0,2));
  }
  // Diet-specific deficiency warnings based on recent week data
  const weekMeals=getWeekMeals();
  if(PR.diet==="vegana"||PR.diet==="vegetariana"){
    const weekProt=weekMeals.reduce((a,m)=>a+(+m.prot||0),0);
    const daysLog=new Set(weekMeals.map(m=>m.date||AD)).size||1;
    const avgProt=weekProt/daysLog;
    if(avgProt<50)tips.unshift("🌱 Tu dieta lleva poca proteína — añade tofu, tempeh, seitán, legumbres o proteína en polvo vegetal");
  }
  // Low vegetable tip
  const veggieKeys=["Verduras","brócoli","espinac","kale","tomate","pimiento"];
  const hasVeg=DD.meals.some(m=>veggieKeys.some(k=>(m.name||"").toLowerCase().includes(k.toLowerCase())));
  if(!hasVeg&&DD.meals.length>2)tips.push("🥗 Hoy falta ración de verduras — añade una ensalada o verduras en la cena");
  return tips.slice(0,4);
}

function getWeekMeals(){
  const out=[];
  const now=new Date();
  for(let i=0;i<7;i++){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const k=d.toISOString().split("T")[0];
    const day=S.gd(k);
    if(day?.meals)day.meals.forEach(m=>out.push({...m,date:k}));
  }
  return out;
}

function getExerciseTips(){

  if(!latest)return["📏 Registra tu peso y medidas para recibir tips personalizados de ejercicio"];
  const imc=latest.imc;
  const isWoman=!isMale();
  if(imc>=25){
    tips.push("🔥 Para reducir grasa corporal: cardio zona 2 (spinning, bici, caminar rápido) 3-4 días + fuerza 2 días");
  }
  if(latest.waist&&latest.waist>(isWoman?85:94)){

  }
  if(isWoman){
    tips.push("🍑 Aumento glúteo: hip thrust, sentadillas búlgaras, peso muerto rumano, lunges con peso. 3x semana + progresión de peso");
  }
  if(latest.arm){
    const tgtArm=isWoman?28:35;
    if(latest.arm<tgtArm)tips.push(`💪 Aumento brazo: bíceps curl, tríceps jalón, press militar. 3 series 10-12 reps, 2x semana`);
  }
  if(latest.chest){

// ══════ MILESTONES (REPO CHALLENGE) ══════
function generateMilestones(){
  // Auto-generate personalized milestones based on body measurements and challenge
  const out=[];
  const latest=BL.length?BL[BL.length-1]:null;
  if(!latest)return out;
  const isWoman=!isMale();
  // Weight loss/gain milestones
  if(CH.targetWeight){
    const diff=+(latest.weight-CH.targetWeight).toFixed(1);
    if(diff>0){
      // Lose weight milestones
      const steps=[2,5,10];
      steps.forEach(kg=>{if(diff>=kg)out.push({type:"weight",label:`Bajar ${kg} kg`,target:latest.weight-kg,icon:"⚖️"});});
    } else if(diff<0){
      const steps=[1,3,5];
      steps.forEach(kg=>{if(Math.abs(diff)>=kg)out.push({type:"weight_up",label:`Subir ${kg} kg`,target:latest.weight+kg,icon:"💪"});});
    }
  }
  // Measurement milestones
  if(latest.waist&&latest.waist>(isWoman?75:85)){
    out.push({type:"waist",label:"Reducir cintura -3cm",target:latest.waist-3,icon:"📐"});
    out.push({type:"waist",label:"Reducir cintura -5cm",target:latest.waist-5,icon:"📐"});
  }
  if(latest.hip&&isWoman){
    out.push({type:"hip_up",label:"Aumentar glúteo +2cm",target:latest.hip+2,icon:"🍑"});
  }
  if(latest.arm){
    out.push({type:"arm_up",label:"Aumentar brazo +1cm",target:latest.arm+1,icon:"💪"});
  }
  if(latest.chest){
    out.push({type:"chest_up",label:"Aumentar pecho +2cm",target:latest.chest+2,icon:"🎯"});
  }
  // Progress-agnostic
  out.push({type:"consistency",label:"Registrar 7 días seguidos",target:7,icon:"🔥"});
  out.push({type:"consistency",label:"Registrar 30 días seguidos",target:30,icon:"🏆"});
  return out;
}

function checkMilestoneProgress(ms){
  const latest=BL.length?BL[BL.length-1]:null;
  if(!latest)return 0;
  if(ms.type==="weight")return latest.weight<=ms.target?100:Math.round((CH.startWeight-latest.weight)/(CH.startWeight-ms.target||1)*100);
  if(ms.type==="weight_up")return latest.weight>=ms.target?100:Math.round((latest.weight-CH.startWeight)/(ms.target-CH.startWeight||1)*100);
  if(ms.type==="waist"&&latest.waist)return latest.waist<=ms.target?100:Math.round(((BL[0]?.waist||latest.waist)-latest.waist)/((BL[0]?.waist||latest.waist)-ms.target||1)*100);
  if(ms.type==="hip_up"&&latest.hip)return latest.hip>=ms.target?100:Math.round((latest.hip-(BL[0]?.hip||latest.hip))/(ms.target-(BL[0]?.hip||latest.hip)||1)*100);
  if(ms.type==="arm_up"&&latest.arm)return latest.arm>=ms.target?100:50;
  if(ms.type==="chest_up"&&latest.chest)return latest.chest>=ms.target?100:50;
  if(ms.type==="consistency"){
    let count=0;
    for(let i=0;i<ms.target+5;i++){
      const d=new Date();d.setDate(d.getDate()-i);
      const dd=S.gd(d.toISOString().split("T")[0]);
      if(dd?.meals?.length)count++; else break;
    }
    return Math.min(100,Math.round(count/ms.target*100));
  }
  return 0;
}

// ══════ BODY AVATAR ══════
function renderBodyAvatar(){
  const latest=BL.length?BL[BL.length-1]:null;
  if(!latest)return div("empty","Registra medidas para ver el avatar");
  const wrap=div("");wrap.style.cssText="display:flex;justify-content:center;align-items:flex-end;gap:12px;padding:10px 0";
  const isF=!isMale();
  // Calculate scale factors based on IMC (past/present/target)
  const scaleFromIMC=imc=>{
    if(imc<18.5)return 0.75;
    if(imc<22)return 0.85;
    if(imc<25)return 1.0;
    if(imc<28)return 1.12;
    if(imc<30)return 1.22;
    return 1.35;
  };
  const firstEntry=BL.length>1?BL[0]:null;
  const pastImc=firstEntry?.imc;
  const curImc=latest.imc;
  const targetW=CH.active&&CH.targetWeight?CH.targetWeight:null;
  const targetImc=targetW?calcIMC(targetW,PR.height):null;
  const pastScale=pastImc?scaleFromIMC(pastImc):null;
  const curScale=scaleFromIMC(curImc);
  const tgtScale=targetImc?scaleFromIMC(targetImc):null;

  const bodyPath=(scale,cx,color,opacity,dashed)=>{
    // Simple body silhouette - female more curvy hips if isF
    const headR=12*scale;
    const shW=(isF?13:15)*scale;
    const waistW=(isF?10:13)*scale;
    const hipW=(isF?16:14)*scale;
    const legW=8*scale;
    const opStr=opacity?` opacity="${opacity}"`:'';
    const dashStr=dashed?' stroke-dasharray="4,3"':'';
    // y coords
    return `<g stroke="${color}" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"${opStr}${dashStr}>
      <circle cx="${cx}" cy="22" r="${headR}"/>
      <line x1="${cx-shW}" y1="42" x2="${cx+shW}" y2="42"/>
      <path d="M${cx-shW},42 Q${cx-waistW},70 ${cx-waistW},95 Q${cx-hipW},115 ${cx-legW},145 L${cx-legW},195"/>
      <path d="M${cx+shW},42 Q${cx+waistW},70 ${cx+waistW},95 Q${cx+hipW},115 ${cx+legW},145 L${cx+legW},195"/>
      <line x1="${cx-shW}" y1="42" x2="${cx-shW-5*scale}" y2="100"/>
      <line x1="${cx+shW}" y1="42" x2="${cx+shW+5*scale}" y2="100"/>
    </g>`;
  };

  const W=300,H=220;
  let svgStr=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="max-width:100%">`;
  // Past (red) - slightly to left
  if(pastScale&&firstEntry.date!==latest.date){
    svgStr+=bodyPath(pastScale,80,"var(--coral)",0.6,false);
  }
  // Present (orange/amber) - center
  svgStr+=bodyPath(curScale,150,"var(--amber)",1.0,false);
  // Target (green) - right
  if(tgtScale&&targetW){
    svgStr+=bodyPath(tgtScale,220,"var(--lime)",0.8,true);
  }
  svgStr+=`</svg>`;
  wrap.innerHTML=svgStr;

  // Legend
  const leg=div("");leg.style.cssText="display:flex;justify-content:center;gap:14px;font-size:10px;margin-top:8px;flex-wrap:wrap";
  if(pastScale&&firstEntry.date!==latest.date){

  }

  if(tgtScale&&targetW){

  }
  const container=div("");container.appendChild(wrap);container.appendChild(leg);
  return container;
}

// ══════ FASTING ══════
function fastingStatus(){
  if(!FASTING.active)return null;
  const proto=parseInt(FASTING.protocol)||16;
  let elapsed;
  if(FASTING.manualHours!=null){elapsed=FASTING.manualHours;}
  else if(FASTING.startTime){elapsed=Math.floor((Date.now()-FASTING.startTime)/3600000);}
  else elapsed=0;
  return{elapsed,goal:proto,pct:Math.min(100,Math.round(elapsed/proto*100)),inFast:elapsed<proto,eatWindow:24-proto};
}

function renderFoodSearch(container,inputEl){

  if(FOOD_CAT!=="Todos")foods=foods.filter(f=>f.cat===FOOD_CAT);
  if(!FS&&!SF&&FOOD_CAT==="Todos")return;
  if(!SF){
    if(!FS&&FOOD_CAT!=="Todos"){
      const drop=div("drop");
      foods.slice(0,14).forEach(f=>{
        const row=div("drow");
        row.innerHTML=`<div><span style="font-size:13px">${fn(f)}</span>${(ftags(f)||[]).map(t=>`<span style="font-size:9px;background:var(--s3);color:var(--tx3);border-radius:4px;padding:2px 5px;margin-left:5px">${t}</span>`).join("")}</div><span class="mono" style="color:var(--lime);font-size:11px">${f.cal}kcal</span>`;

        drop.appendChild(row);
      });container.appendChild(drop);return;
    }
    const filtered=foods.filter(f=>fn(f).toLowerCase().includes(FS.toLowerCase())).slice(0,14);
    if(!filtered.length){const d=div("drop");d.innerHTML=`<div style="padding:12px 14px;color:var(--tx3);font-size:12px">Sin resultados</div>`;container.appendChild(d);return;}
    const drop=div("drop");
    filtered.forEach(f=>{
      const row=div("drow");
      const isFav=FAV.includes(f.id);
      row.innerHTML=`<div style="flex:1"><div style="font-size:13px;font-weight:500">${fn(f)}</div><div style="font-size:10px;color:var(--tx3);font-family:'Geist Mono',monospace">${f.cat}</div></div>

const WATER_SIZES=[
  {ml:150,icon:"i-drop",label:"Cortado",sub:"150ml"},
  {ml:200,icon:"i-drop",label:"Vaso pequeño",sub:"200ml"},
  {ml:250,icon:"i-drop",label:"Vaso normal",sub:"250ml"},
  {ml:330,icon:"i-drop",label:"Vaso grande",sub:"330ml"},
  {ml:500,icon:"i-drop",label:"Botella 500ml",sub:"500ml"},
  {ml:750,icon:"i-drop",label:"Botella 750ml",sub:"750ml"},

  {ml:1500,icon:"i-drop",label:"Botella 1.5L",sub:"1500ml"},
];

function renderWaterInline(el){
  // Ensure water state + stack
  if(!DD.waterStack)DD.waterStack=[];
  const w=DD.water||0,over=w>WATER_GOAL;
  const wpBar=Math.min(100,Math.round(w/WATER_GOAL*100)),wpReal=Math.round(w/WATER_GOAL*100);
  const col=over?"var(--lime)":"var(--sky)";

  // Big circular ring
  const mc=card([]);
  mc.innerHTML=`<div class="card-head" style="margin-bottom:12px"><div class="card-title" style="color:${col}"><svg style="width:11px;height:11px;color:${col};stroke:currentColor;fill:none;stroke-width:1.75"><use href="#i-drop"/></svg> Hidratación diaria</div>${over?`<div class="badge good">✓ Superado</div>`:""}</div>`;
  // Build SVG ring inline (big one like in mockup)
  const R=140,STROKE=14,r=(R-STROKE)/2,circ=2*Math.PI*r,off=circ*(1-wpBar/100);
  const ringWrap=div("");ringWrap.style.cssText="position:relative;width:160px;height:160px;margin:6px auto 10px";
  ringWrap.innerHTML=`<svg width="160" height="160" viewBox="0 0 160 160"><circle cx="80" cy="80" r="${r}" stroke="var(--s3)" stroke-width="${STROKE}" fill="none"/><circle cx="80" cy="80" r="${r}" stroke="${col}" stroke-width="${STROKE}" fill="none" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round" transform="rotate(-90 80 80)" style="transition:stroke-dashoffset .6s"/></svg>
  <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center"><div style="font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em">Agua</div><div style="font-size:30px;font-weight:800;color:${col};font-family:'Geist Mono',monospace;line-height:1">${(w/1000).toFixed(1)}</div><div style="font-size:10px;color:var(--tx3)">/ ${(WATER_GOAL/1000).toFixed(1)} L</div><div style="font-size:11px;color:${col};font-weight:700;margin-top:3px">${wpReal}%</div></div>`;
  mc.appendChild(ringWrap);
  mc.innerHTML+=`<div style="font-size:11px;color:var(--tx3);text-align:center;margin-bottom:6px" class="mono">${w} ml${over?` · +${w-WATER_GOAL}ml 🎉`:` · ${WATER_GOAL-w} restantes`}</div>`;
  // Undo button (replaces fixed subtractions)
  if(DD.waterStack.length){
    const undoBtn=h("button",{class:"btn ghost",style:{marginTop:"8px"}});
    const last=DD.waterStack[DD.waterStack.length-1];
    undoBtn.innerHTML=svg("i-undo")+` Deshacer último (−${last}ml)`;
    undoBtn.onclick=()=>{const last2=DD.waterStack.pop()||0;DD.water=Math.max(0,(DD.water||0)-last2);saveDay();renderFood();renderHome();toast("↩️ −"+last2+"ml");};
    mc.appendChild(undoBtn);
  }
  el.appendChild(mc);

  // Manual input - FIXED
  const minCard=card([]);
  minCard.innerHTML=`<div class="card-title" style="margin-bottom:10px">${svg("i-edit")} Cantidad manual</div>`;
  const manRow=div("");manRow.style.cssText="display:flex;gap:8px;align-items:center";
  const manI=h("input",{class:"inp",type:"number",placeholder:"ml (ej 350)",style:{marginBottom:"0",flex:"1"},inputmode:"numeric"});
  const manB=h("button",{class:"btn primary",style:{flex:"none",padding:"11px 14px",marginTop:"0",width:"auto"}});
  manB.innerHTML=svg("i-plus")+" Añadir";
  const addManual=()=>{
    const v=parseInt(manI.value);
    if(!v||v<=0){toast("Introduce una cantidad válida");return;}
    DD.water=(DD.water||0)+v;
    if(!DD.waterStack)DD.waterStack=[];DD.waterStack.push(v);
    saveDay();renderFood();renderHome();toast("💧 +"+v+"ml añadidos");
    manI.value="";
  };
  manB.onclick=addManual;
  manI.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();addManual();}});
  manRow.append(manI,manB);minCard.appendChild(manRow);el.appendChild(minCard);

  // Quick buttons
  const ac=card([]);
  ac.innerHTML=`<div class="card-title" style="margin-bottom:10px">${svg("i-drop")} Añadir rápido</div>`;
  const grid=div("g2");
  WATER_SIZES.forEach(({ml,icon,label,sub})=>{
    const btn=div("water-btn");
    btn.innerHTML=`<div class="w-ico"><svg style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2"><use href="#${icon}"/></svg></div><div><div class="w-l">${label}</div><div class="w-s">${sub}</div></div>`;
    btn.onclick=()=>{DD.water=(DD.water||0)+ml;if(!DD.waterStack)DD.waterStack=[];DD.waterStack.push(ml);saveDay();renderFood();renderHome();toast("+"+ml+"ml 💧");};
    grid.appendChild(btn);
  });ac.appendChild(grid);
  el.appendChild(ac);

  // Last 7 days history
  const hist=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const k=d.toISOString().split("T")[0];const day=S.gd(k);hist.push({date:k,w:day?.water||0,day:d.toLocaleDateString("es-ES",{weekday:"short"})});}
  const maxW=Math.max(...hist.map(x=>x.w),WATER_GOAL);
  const hCard=card([]);hCard.innerHTML=`<div class="card-head" style="margin-bottom:8px"><div class="card-title">Últimos 7 días</div><div class="card-sub mono">prom. ${(hist.reduce((a,x)=>a+x.w,0)/7/1000).toFixed(1)}L</div></div>`;
  const sparkWrap=div("");sparkWrap.style.cssText="display:flex;align-items:flex-end;gap:4px;height:50px";
  hist.forEach((x,i)=>{
    const b=div("");const h2=Math.max(6,Math.round(x.w/maxW*50));
    const isToday=x.date===td();
    b.style.cssText=`flex:1;height:${h2}px;border-radius:4px 4px 0 0;min-height:4px;background:${isToday?"var(--lime)":x.w>=WATER_GOAL?"var(--sky)":"var(--s3)"};${isToday?"box-shadow:0 0 10px color-mix(in oklch,var(--lime) 50%,transparent);":""}`;
    sparkWrap.appendChild(b);
  });hCard.appendChild(sparkWrap);
  const days=div("");days.style.cssText="display:flex;gap:4px;margin-top:4px";
  hist.forEach(x=>{const d=h("div",{style:{flex:"1",textAlign:"center",fontSize:"8px",textTransform:"uppercase",color:x.date===td()?"var(--lime)":"var(--tx4)",fontWeight:"600"}},[x.day.slice(0,3)]);days.appendChild(d);});
  hCard.appendChild(days);el.appendChild(hCard);
}

function getMotivation(data,targetW){
  if(!data||!data.length)return{emoji:"📏",title:"¡Empieza a registrar!",text:"Añade tu primer peso.",color:"var(--sky)"};
  const latest=data[data.length-1];const first=data[0];
  const diff=+(latest.weight-first.weight).toFixed(1);
  const ideal=idealRange();
  if(targetW&&latest.weight<=targetW)return{emoji:"🏆",title:"¡OBJETIVO CONSEGUIDO!",text:`¡Llegaste a ${latest.weight}kg! Tu objetivo era ${targetW}kg. ¡Increíble!`,color:"var(--lime)"};
  if(targetW){
    const left=+(latest.weight-targetW).toFixed(1);
    const rate=data.length>=2?+((first.weight-latest.weight)/(data.length-1)*7).toFixed(2):0.3;
    const weeks=rate>0?Math.ceil(left/rate):"—";
    if(diff<-3)return{emoji:"🔥",title:`¡Llevas ${Math.abs(diff)}kg menos! Quedan ${left}kg`,text:`A este ritmo podrías llegar a ${targetW}kg en ~${weeks} semanas.`,color:"var(--lime)"};
    if(diff<-1)return{emoji:"💪",title:`${Math.abs(diff)}kg menos. Quedan ${left}kg`,text:"En el buen camino. Constancia > perfección.",color:"var(--sky)"};
    return{emoji:"🎯",title:`Quedan ${left}kg para ${targetW}kg`,text:"Sigue registrando cada semana para ver tu progreso real.",color:"var(--mag)"};
  }
  if(latest.weight>=ideal.min&&latest.weight<=ideal.max)return{emoji:"✨",title:"¡Estás en tu peso ideal!",text:`${latest.weight}kg está en el rango ideal (${ideal.min}–${ideal.max}kg).`,color:"var(--lime)"};
  if(diff<-2)return{emoji:"🎉",title:`¡${Math.abs(diff)}kg menos desde el inicio!`,text:`De ${first.weight}kg a ${latest.weight}kg. ¡Logro real!`,color:"var(--lime)"};
  return{emoji:"📊",title:"Sigue registrando",text:"Con más datos podré darte proyecciones precisas.",color:"var(--sky)"};
}

function richChart(data,targetW){
  const W=310,H=170,PL=36,PR2=12,PT=20,PB=26;
  const cW=W-PL-PR2,cH=H-PT-PB;
  const ideal=idealRange();
  const ws=data.map(d=>d.weight);
  const allVals=[...ws,ideal.min,ideal.max];if(targetW)allVals.push(targetW);
  const mn=Math.min(...allVals)-1.5,mx=Math.max(...allVals)+1.5,rng=mx-mn||2;
  const toY=v=>PT+cH-((v-mn)/rng)*cH;
  const toX=i=>PL+(data.length<=1?cW/2:(i/(data.length-1))*cW);
  const pts=data.map((d,i)=>({x:toX(i),y:toY(d.weight),d}));
  const pathD=pts.map((p,i)=>(i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1)).join(" ");
  // trend
  let trend="";
  if(data.length>=3){const n=data.length,xs=data.map((_,i)=>i),ys=ws;const sx=xs.reduce((a,b)=>a+b,0),sy=ys.reduce((a,b)=>a+b,0);const sxy=xs.reduce((a,v,i)=>a+v*ys[i],0),sx2=xs.reduce((a,b)=>a+b*b,0);const sl=(n*sxy-sx*sy)/(n*sx2-sx*sx||1),ic=(sy-sl*sx)/n;trend=`<line x1="${toX(0).toFixed(1)}" y1="${toY(ic).toFixed(1)}" x2="${toX(n-1).toFixed(1)}" y2="${toY(sl*(n-1)+ic).toFixed(1)}" stroke="oklch(0.88 0.22 130)" stroke-width="1.2" stroke-dasharray="4,3" opacity=".5"/>`;}
  // grids
  let grids="";for(let i=0;i<=4;i++){const v=+(mn+rng*i/4).toFixed(1);const gy=toY(v).toFixed(1);grids+=`<line x1="${PL}" y1="${gy}" x2="${W-PR2}" y2="${gy}" stroke="#222228" stroke-width="1"/><text x="${PL-3}" y="${+gy+3}" text-anchor="end" font-size="7" fill="#52525b">${v}</text>`;}
  // ideal band
  const iy1=toY(ideal.max).toFixed(1),iy2=toY(ideal.min).toFixed(1);
  const idealB=`<rect x="${PL}" y="${iy1}" width="${cW}" height="${(+iy2-+iy1)}" fill="oklch(0.80 0.18 75)" opacity=".07"/><line x1="${PL}" y1="${iy1}" x2="${W-PR2}" y2="${iy1}" stroke="oklch(0.80 0.18 75)" stroke-width="1" stroke-dasharray="3,3" opacity=".4"/><line x1="${PL}" y1="${iy2}" x2="${W-PR2}" y2="${iy2}" stroke="oklch(0.80 0.18 75)" stroke-width="1" stroke-dasharray="3,3" opacity=".4"/><text x="${W-PR2-2}" y="${+iy1-2}" text-anchor="end" font-size="6" fill="oklch(0.80 0.18 75)" opacity=".7">Ideal</text>`;
  // target
  const hasT=!!(targetW);const tY=hasT?toY(targetW):0;
  const tLine=hasT?`<line x1="${PL}" y1="${tY.toFixed(1)}" x2="${W-PR2}" y2="${tY.toFixed(1)}" stroke="oklch(0.72 0.22 350)" stroke-width="1.5" stroke-dasharray="5,3" opacity=".7"/><text x="${W-PR2-2}" y="${(tY-3).toFixed(1)}" text-anchor="end" font-size="6.5" fill="oklch(0.72 0.22 350)">Obj ${targetW}</text>`:"";
  const projDash=hasT&&pts.length?`<line x1="${pts[pts.length-1].x.toFixed(1)}" y1="${pts[pts.length-1].y.toFixed(1)}" x2="${(PL+cW).toFixed(1)}" y2="${tY.toFixed(1)}" stroke="oklch(0.72 0.22 350)" stroke-width="1.2" stroke-dasharray="3,3" opacity=".5"/><circle cx="${(PL+cW).toFixed(1)}" cy="${tY.toFixed(1)}" r="4" fill="oklch(0.72 0.22 350)" opacity=".8"/>`:""
  const area=data.length>1?`<path d="${pathD} L${pts[pts.length-1].x.toFixed(1)},${(PT+cH)} L${pts[0].x.toFixed(1)},${(PT+cH)} Z" fill="url(#rg3)"/>`:""
  const line=data.length>1?`<path d="${pathD}" fill="none" stroke="oklch(0.88 0.22 130)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`:""
  let circles="";
  pts.forEach((p,i)=>{const isL=i===pts.length-1,isF=i===0;const sl=isL||isF||pts.length<=5;const prev=i>0?pts[i-1]:null;const df=prev?+(p.d.weight-prev.d.weight).toFixed(1):null;const ac=df===null?"oklch(0.88 0.22 130)":df<0?"oklch(0.88 0.22 130)":"oklch(0.72 0.22 25)";circles+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${isL?5:3}" fill="${isL?"oklch(0.88 0.22 130)":"#0f0f11"}" stroke="oklch(0.88 0.22 130)" stroke-width="${isL?2:1.5}"/>`;if(sl){circles+=`<text x="${p.x.toFixed(1)}" y="${(p.y-8).toFixed(1)}" text-anchor="middle" font-size="8" fill="#f4f4f5" font-weight="${isL?"700":"400"}">${p.d.weight}</text>`;if(df!==null)circles+=`<text x="${p.x.toFixed(1)}" y="${(p.y-17).toFixed(1)}" text-anchor="middle" font-size="7" fill="${ac}">${df>0?"+":""}${df}</text>`;}});
  let dateL="";pts.filter((_,i)=>i===0||i===pts.length-1||pts.length<=4).forEach(p=>{dateL+=`<text x="${p.x.toFixed(1)}" y="${(H-4)}" text-anchor="middle" font-size="6.5" fill="#52525b">${p.d.dateLabel}</text>`;});
  const s=document.createElementNS("http://www.w3.org/2000/svg","svg");
  s.setAttribute("viewBox",`0 0 ${W} ${H}`);s.style.cssText="width:100%;height:170px;overflow:visible";
  s.innerHTML=`<defs><linearGradient id="rg3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="oklch(0.88 0.22 130)" stop-opacity=".2"/><stop offset="100%" stop-color="oklch(0.88 0.22 130)" stop-opacity="0"/></linearGradient></defs>${grids}${idealB}${tLine}${trend}${area}${line}${projDash}${circles}${dateL}`;
  return s;
}

// ══════ TABS ══════
function switchTab(tab){
  CT=tab;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.tab===tab));
  document.querySelectorAll("[id^='tab-']").forEach(t=>t.style.display="none");
  document.getElementById("tab-"+tab).style.display="flex";
  document.getElementById("tab-"+tab).style.flexDirection="column";
  document.getElementById("tab-"+tab).style.gap="12px";
  document.getElementById("scr").scrollTop=0;
  render();
}

function render(){
  renderHeader();
  if(CT==="home")renderHome();
  else if(CT==="food")renderFood();
  else if(CT==="water")renderWater();
  else if(CT==="exercise")renderExercise();
  else if(CT==="body")renderBody();
  else if(CT==="challenge")renderChallenge();
  else if(CT==="cycle")renderCycle();
  else if(CT==="profile")renderProfile();
}

// Auto day change at midnight
function checkDayChange(){
  // Robust rollover: check every 30s if date changed
  setInterval(()=>{
    const cur=td();
    if(isToday()&&AD!==cur){AD=cur;DD=S.gd(AD)||dDay();render();}
  },30000);
}
