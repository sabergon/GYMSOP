<style>
:root{--bg:#0a0a12;--bg2:#12121e;--bg3:#1a1a2e;--bg4:#1e1e2e;--bd:#2d2d4d;--bd2:#1e1e30;--tx:#e8e8f0;--tx2:#b2bec3;--tx3:#636e72;--tx4:#4a5568;--blue:#74b9ff;--pur:#a29bfe;--pink:#fd79a8;--yel:#fdcb6e;--ora:#ff9f43;--grn:#2ecc71;--red:#ff6b6b;--acc:#6c5ce7;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'DM Sans',sans-serif;color:var(--tx);max-width:480px;margin:0 auto;display:flex;flex-direction:column}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.5}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}
#hdr{background:linear-gradient(160deg,#0f0c29,#1a1a3e,#0f3460);padding:calc(var(--st) + 12px) 14px 10px;border-bottom:1px solid var(--bd2);flex-shrink:0}
.hnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.hbtn{background:none;border:1px solid var(--bd);border-radius:8px;color:var(--blue);font-size:20px;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.hdate{font-size:9px;color:var(--blue);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:1px}
.htitle{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--blue),var(--pur),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.hchips{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:5px}
#tabs{display:flex;background:#0d0d1a;border-bottom:1px solid var(--bd2);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;width:100%}
.tab{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 2px;background:none;border:none;color:var(--tx4);cursor:pointer;font-size:6.5px;font-weight:700;letter-spacing:0;font-family:inherit;white-space:nowrap;overflow:hidden}
.tab .ti{font-size:13px}.tab.on{color:var(--blue);border-bottom:2px solid var(--blue);background:#0d1520}
#scr{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:10px 10px calc(var(--sb) + 10px)}
.col{display:flex;flex-direction:column;gap:10px}
.card{background:var(--bg2);border-radius:14px;padding:14px;border:1px solid var(--bd2)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.bb{display:flex;justify-content:space-between;align-items:center}
.bbg{background:var(--bg4);border-radius:20px;height:7px;overflow:hidden;margin-top:2px}
.bbf{height:100%;border-radius:20px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.inp,.sel,.ta{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:10px;padding:9px 12px;color:var(--tx);font-size:13px;outline:none;margin-bottom:8px;font-family:inherit}
.ta{resize:none;line-height:1.5}
.bp{width:100%;background:linear-gradient(135deg,var(--acc),var(--pur));border:none;border-radius:12px;padding:12px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;margin-top:4px}
.bs{width:100%;background:var(--bg4);border:1px solid var(--bd);border-radius:12px;padding:10px;color:var(--tx2);font-weight:600;font-size:13px;cursor:pointer;font-family:inherit}
.rmv{background:none;border:none;color:var(--tx4);cursor:pointer;font-size:13px;padding:4px}
.qb{background:var(--bd);border:none;border-radius:8px;color:var(--tx);width:32px;height:32px;font-size:18px;cursor:pointer;flex-shrink:0}
.qi{width:60px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:4px 6px;color:var(--tx);font-size:15px;text-align:center;outline:none;font-family:inherit}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px}
.bgood{background:#2ecc7122;color:var(--grn)}.bbad{background:#ff6b6b22;color:var(--red)}
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--acc);border-radius:20px;padding:9px 20px;font-size:13px;font-weight:600;z-index:300;color:var(--tx);box-shadow:0 8px 40px #0009;white-space:nowrap;max-width:90vw;opacity:0;transition:opacity .3s;pointer-events:none}
#toast.show{opacity:1}
.ov{position:fixed;inset:0;background:#000000cc;display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:var(--bg2);border-radius:20px;padding:24px;width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px;border:1px solid var(--bd);text-align:center;max-height:90vh;overflow-y:auto}
.drop{background:var(--bg3);border:1px solid var(--bd);border-radius:10px;margin-top:2px;overflow:hidden;max-height:200px;overflow-y:auto}
.drow{padding:9px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bd2)}
.empty{text-align:center;color:var(--tx3);padding:36px;font-size:13px;line-height:2.2}
.icard{background:var(--bg4);border-radius:12px;padding:12px;text-align:center}
.wbtn{display:flex;flex-direction:column;align-items:center;gap:3px;background:var(--bg3);border:1px solid var(--bd);border-radius:12px;padding:10px 12px;color:var(--tx);cursor:pointer;font-family:inherit}
.excard{background:var(--bg3);border-radius:12px;padding:10px;cursor:pointer;border:1px solid var(--bd)}
.ubtn{background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:5px 10px;color:var(--tx3);font-size:12px;cursor:pointer;font-family:inherit}
.ubtn.on{background:#0d1520;border-color:var(--blue);color:var(--blue)}
.fbtn{background:var(--bg3);border:1px solid var(--bd);border-radius:20px;padding:5px 12px;color:var(--tx3);font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit}
.fbtn.on{background:#0d1520;border-color:var(--blue);color:var(--blue)}
.mbtn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:2px solid transparent;border-radius:10px;padding:6px 3px;cursor:pointer}
.mbtn.on{border-color:var(--blue);background:#0d1520}
.gopt{background:var(--bg3);border:1px solid var(--bd);border-radius:12px;padding:12px 14px;cursor:pointer;text-align:left;margin-bottom:8px}
.gopt.on{border-color:var(--pur);background:#1a1030}
.stoggle{display:flex;gap:6px;margin-bottom:10px}
.stab{flex:1;background:var(--bg2);border:1px solid var(--bd2);border-radius:10px;padding:8px;color:var(--tx3);font-weight:600;font-size:11px;cursor:pointer;font-family:inherit}
.stab.on{background:#0d1520;border-color:var(--blue);color:var(--blue)}
#install-banner{display:none;position:fixed;bottom:calc(var(--sb) + 10px);left:10px;right:10px;background:linear-gradient(135deg,var(--acc),var(--pur));border-radius:16px;padding:14px 16px;z-index:100;box-shadow:0 8px 40px #6c5ce766}
.ibrow{display:flex;justify-content:space-between;align-items:center;gap:10px}
.ibbtn{background:#fff3;border:1px solid #fff5;border-radius:10px;padding:7px 14px;color:#fff;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit}
.ibcl{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;opacity:.7}
.steps-card{background:linear-gradient(135deg,#0d1f3c,#1a0d30);border:1px solid #74b9ff33;border-radius:14px;padding:14px}
.challenge-ring{width:100px;height:100px;margin:0 auto}
/* toggle switch */
.tsw{position:relative;display:inline-block;width:44px;height:24px}
.tsw input{opacity:0;width:0;height:0}
.tsl{position:absolute;cursor:pointer;inset:0;background:var(--bd);border-radius:24px;transition:.3s}
.tsl:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.tsl{background:var(--acc)}
input:checked+.tsl:before{transform:translateX(20px)}
</style>
</head>

const UF={"g":1,"ml":1,"100g":1,"unidad":1,"ración":1,"porción":1,"lata":1,"mazorca":1,"rama":1,

function getCF(f,qty,unit){
  const u=unit||"g";
  if(u==="g"||u==="ml")return qty/100;
  if(["unidad","ración","porción","lata","mazorca","rama"].includes(u))return qty;
  const factor=UF[u]||1;
  return qty*factor/100*100/100; // qty * grams_per_unit / 100
}
// Simplified: qty * grams_equiv / 100
function getF(qty,unit){
  const u=unit||"g";
  if(u==="g"||u==="ml")return qty/100;
  if(["unidad","ración","porción","lata","mazorca","rama"].includes(u))return qty;
  const gmap={"vaso":250,"taza":240,"plato":300,"puñado":30,"rebanada":30,"cucharada":15,"pizca":1,
    "1/4 plato":75,"1/2 plato":150,"1/3 plato":100,"1/4 vaso":62.5,"1/2 vaso":125,"1/3 vaso":83,
    "1/4 taza":60,"1/2 taza":120,"1/3 taza":80};
  return qty*(gmap[u]||100)/100;
}

function td(){return new Date().toISOString().split("T")[0];}
function dDay(){return{water:0,meals:[],exercises:[],mood:null,energy:null,note:"",steps:0};}
function fmtD(d){return new Date(d+"T12:00:00").toLocaleDateString("es-ES",{day:"numeric",month:"short",year:"2-digit"});}
function pct(v,g){return Math.min(100,Math.round((v/g)*100));}
function isMale(){return PR.sex==="male";}
function calGoal(){const g=isMale()?GOALS_M:GOALS_F;return GL.type==="custom"?(GL.customCal||(isMale()?2000:1700)):(g[GL.type]?.cal||(isMale()?2400:1550));}
function calcIMC(kg,h){const hm=(h||PR.height||152)/100;return+(kg/(hm*hm)).toFixed(1);}
function imcCat(v){return v<18.5?{l:"Bajo peso",c:"var(--blue)"}:v<25?{l:"Normopeso ✓",c:"var(--grn)"}:v<30?{l:"Sobrepeso",c:"var(--yel)"}:{l:"Obesidad",c:"var(--red)"};}
function estFat(imc,age,male){const a=age||PR.age||29;return male?+(0.1*imc*imc+0.23*a-16.2).toFixed(1):+((1.20*imc)+(0.23*a)-5.4).toFixed(1);}
function idealRange(h){const hcm=h||PR.height||152;const i=hcm-100-((hcm-150)/2);return{min:+(i-4).toFixed(1),max:+(i+4).toFixed(1)};}
function whr(w,hip){return w&&hip?{ratio:+(w/hip).toFixed(2),risk:w/hip>=(isMale()?0.9:0.85)?"⚠️ Riesgo":"✅ Normal"}:null;}
function totals(){const r=DD.meals.reduce((a,m)=>({cal:a.cal+m.cal,prot:a.prot+m.prot,carbs:a.carbs+m.carbs,fat:a.fat+m.fat}),{cal:0,prot:0,carbs:0,fat:0});return{cal:Math.round(r.cal),prot:+r.prot.toFixed(1),carbs:+r.carbs.toFixed(1),fat:+r.fat.toFixed(1)};}
function exCal(){return DD.exercises.reduce((a,e)=>a+e.cal_burned,0);}
function allFoods(){return[...FOOD_DB,...CF];}
function isToday(){return AD===td();}

function cycleDay(){
  if(!CY.lastPeriod||isMale())return null;
  const diff=Math.floor((new Date(AD)-new Date(CY.lastPeriod))/86400000)+1;
  return((diff-1)%CY.cycleLen)+1;
}
function currentPhase(){
  const d=cycleDay();if(!d)return null;
  if(d<=5)return CYCLE_PHASES[0];if(d<=13)return CYCLE_PHASES[1];if(d<=16)return CYCLE_PHASES[2];
  return CYCLE_PHASES[3];
}

// ══════ DOM HELPERS ══════
function h(tag,attrs,ch){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k==="class")el.className=v;
    else if(k.startsWith("on"))el[k]=v;
    else el.setAttribute(k,v);
  });
  if(ch)(Array.isArray(ch)?ch:[ch]).forEach(c=>{if(c!=null)el.appendChild(typeof c==="string"?document.createTextNode(c):c);});
  return el;
}
function div(cls,ch){return h("div",{class:cls},ch);}
function card(ch,extra){const d=document.createElement("div");d.className="card"+(extra?" "+extra:"");(Array.isArray(ch)?ch:[ch]).forEach(c=>{if(c)d.appendChild(typeof c==="string"?document.createTextNode(c):c);});return d;}
function barEl(val,color){const bg=div("bbg");const f=div("bbf");f.style.width=val+"%";f.style.background=color;bg.appendChild(f);return bg;}
function icard(label,value,sub,color){const d=div("icard");d.innerHTML=`<div style="font-size:10px;color:var(--tx3);margin-bottom:3px">${label}</div><div style="font-size:18px;font-weight:800;color:${color||"var(--tx)"}">${value}</div>${sub?`<div style="font-size:10px;color:var(--tx3);margin-top:3px;line-height:1.3">${sub}</div>`:""}`;return d;}

function renderFoodSearch(container,inputEl){
  container.querySelectorAll(".drop,.food-sel").forEach(e=>e.remove());
  if(!FS)return;
  if(!SF){
    const drop=div("drop");
    const filtered=allFoods().filter(f=>f.name.toLowerCase().includes(FS.toLowerCase())).slice(0,12);
    if(!filtered.length){drop.innerHTML=`<div style="padding:10px 14px;color:var(--tx3);font-size:12px">Sin resultados. Prueba "Crear alimento"</div>`;}
    else{filtered.forEach(f=>{
      const row=div("drow");
      row.innerHTML=`<div><span style="font-size:13px">${f.name}</span><span style="font-size:10px;color:var(--tx3);margin-left:6px">${f.cat}</span></div><span style="color:var(--blue);font-size:12px">${f.cal}kcal/100g</span>`;
      row.onclick=()=>{SF=f;FS=f.name;FU=f.units[0];FQ=(FU==="g"||FU==="ml")?100:1;inputEl.value=f.name;renderFoodSearch(container,inputEl);};
      drop.appendChild(row);
    });}

  } else {
    const factor=getF(FQ,FU);
    const sd=h("div",{class:"food-sel",style:{background:"var(--bg3)",borderRadius:"12px",padding:"14px",marginTop:"4px",border:"1px solid var(--bd)"}});
    sd.innerHTML=`<div style="font-weight:700;margin-bottom:4px">${SF.name}</div>
    <div style="font-size:11px;color:var(--blue);margin-bottom:10px">${Math.round(SF.cal*factor)} kcal · P:${+(SF.prot*factor).toFixed(1)}g · C:${+(SF.carbs*factor).toFixed(1)}g · G:${+(SF.fat*factor).toFixed(1)}g</div>`;
    const uRow=h("div",{style:{display:"flex",gap:"6px",marginBottom:"10px",flexWrap:"wrap"}});
    SF.units.forEach(u=>{
      const btn=h("button",{class:"ubtn"+(FU===u?" on":"")},[u]);
      btn.onclick=()=>{FU=u;FQ=(u==="g"||u==="ml")?100:1;renderFoodSearch(container,inputEl);};
      uRow.appendChild(btn);
    });
    sd.appendChild(uRow);
    const qRow=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}});
    const qm=h("button",{class:"qb"},["−"]);
    const qi=h("input",{class:"qi",type:"number"});qi.value=FQ;
    qi.oninput=e=>{FQ=+e.target.value;renderFoodSearch(container,inputEl);};
    const qu=h("span",{style:{fontSize:"12px",color:"var(--tx3)",minWidth:"35px"}},[FU]);
    const qp=h("button",{class:"qb"},["+"]);;
    const step=(FU==="g"||FU==="ml")?10:1;
    qm.onclick=()=>{FQ=Math.max(1,FQ-step);qi.value=FQ;renderFoodSearch(container,inputEl);};
    qp.onclick=()=>{FQ+=step;qi.value=FQ;renderFoodSearch(container,inputEl);};
    qRow.append(qm,qi,qu,qp);sd.appendChild(qRow);
    const ab=h("button",{class:"bp"},["Añadir ✓"]);
    ab.onclick=()=>{
      const f=getF(FQ,FU);
      const e={id:Date.now(),name:SF.name,qty:FQ,unit:FU,time:MT,
        cal:Math.round(SF.cal*f),prot:Math.round(SF.prot*f*10)/10,
        carbs:Math.round(SF.carbs*f*10)/10,fat:Math.round(SF.fat*f*10)/10};
      if(!DD.meals)DD.meals=[];DD.meals.push(e);saveDay();
      SF=null;FS="";renderFood();renderHome();toast("✅ "+e.name+" ("+e.cal+" kcal)");

function getMotivation(data,targetW){
  if(!data||data.length===0)return{emoji:"📏",title:"¡Empieza a registrar!",text:"Añade tu primer peso para ver tu evolución y recibir motivación personalizada.",color:"var(--blue)"};
  const latest=data[data.length-1];
  const first=data[0];
  const diff=+(latest.weight-first.weight).toFixed(1);
  const imc=latest.imc;
  const ideal=idealRange();
  const inIdeal=latest.weight>=ideal.min&&latest.weight<=ideal.max;
  if(targetW&&latest.weight<=targetW)return{emoji:"🏆",title:"¡OBJETIVO CONSEGUIDO!",text:"¡Lo has logrado! Estás en "+latest.weight+"kg, tu objetivo era "+targetW+"kg. ¡Eres increíble! Ahora mantén este peso con hábitos saludables.",color:"var(--grn)"};
  if(targetW){
    const left=+(latest.weight-targetW).toFixed(1);
    const rate=data.length>=2?+((first.weight-latest.weight)/(data.length-1)*7).toFixed(2):0.3;
    const weeks=rate>0?Math.ceil(left/rate):"—";
    if(diff<-3)return{emoji:"🔥",title:"¡Llevas "+Math.abs(diff)+"kg menos! Quedan "+left+"kg",text:"A este ritmo (~"+(rate>0?rate:"0.3")+"kg/sem) podrías llegar a "+targetW+"kg en aprox. "+weeks+" semanas. ¡Vas perfecto, no pares!",color:"var(--grn)"};
    if(diff<-1)return{emoji:"💪",title:"Llevas "+Math.abs(diff)+"kg menos. Quedan "+left+"kg",text:"Estás en el buen camino. Recuerda: constancia > perfección. Cada día suma. Quedan "+left+"kg para tu meta de "+targetW+"kg.",color:"var(--blue)"};
    if(diff>=0&&data.length>2)return{emoji:"⚡",title:"Quedan "+left+"kg para tu objetivo",text:"El peso fluctúa, no te preocupes. Revisa la hidratación y el sueño. Tu objetivo de "+targetW+"kg está a "+left+"kg. ¡Tú puedes!",color:"var(--yel)"};
    return{emoji:"🎯",title:"Objetivo: "+targetW+"kg. Quedan "+left+"kg",text:"Llevas "+data.length+" registro"+(data.length>1?"s":"")+" de seguimiento. La constancia es la clave. Sigue registrando cada día.",color:"var(--pur)"};
  }
  if(inIdeal)return{emoji:"✨",title:"¡Estás en tu peso ideal!",text:latest.weight+"kg está dentro del rango ideal ("+ideal.min+"–"+ideal.max+"kg). ¡Objetivo: mantener y tonificar!",color:"var(--grn)"};
  if(diff<-2&&data.length>=2)return{emoji:"🎉",title:"¡"+Math.abs(diff)+"kg menos desde que empezaste!",text:"De "+first.weight+"kg a "+latest.weight+"kg. ¡Eso es un logro real! Activa un reto en la pestaña 🎯 para fijar tu meta.",color:"var(--grn)"};
  if(imc>=25)return{emoji:"💜",title:"Progreso paso a paso",text:"IMC "+imc+". El camino hacia "+ideal.max+"kg (tu ideal) son "+(+(latest.weight-ideal.max).toFixed(1))+"kg. Activa un reto en 🎯 para tener un objetivo claro.",color:"var(--pur)"};
  return{emoji:"📊",title:"Sigue registrando",text:"Con más datos podré darte proyecciones y motivación más precisas. ¡Registra tu peso cada semana!",color:"var(--blue)"};
}

function richChart(data,targetW){
  const W=320,H=185,PL=38,PR2=16,PT=22,PB=28;
  const cW=W-PL-PR2,cH=H-PT-PB;
  const ideal=idealRange();
  const iMin=ideal.min,iMax=ideal.max;
  const ws=data.map(d=>d.weight);
  const allVals=[...ws,iMin,iMax];
  if(targetW)allVals.push(targetW);
  const mn=Math.min(...allVals)-1.5,mx=Math.max(...allVals)+1.5;
  const rng=mx-mn||2;
  const toY=v=>PT+cH-((v-mn)/rng)*cH;
  const toX=i=>PL+(data.length<=1?cW/2:(i/(data.length-1))*cW);
  const pts=data.map((d,i)=>({x:toX(i),y:toY(d.weight),d}));
  const pathD=pts.map((p,i)=>(i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1)).join(" ");
  // Trend line
  let trendPath="";
  if(data.length>=3){
    const n=data.length,xs=data.map((_,i)=>i),ys=ws;
    const sx=xs.reduce((a,b)=>a+b,0),sy=ys.reduce((a,b)=>a+b,0);
    const sxy=xs.reduce((a,v,i)=>a+v*ys[i],0),sx2=xs.reduce((a,b)=>a+b*b,0);
    const sl=(n*sxy-sx*sy)/(n*sx2-sx*sx||1),ic=(sy-sl*sx)/n;
    trendPath='<line x1="'+toX(0).toFixed(1)+'" y1="'+toY(ic).toFixed(1)+'" x2="'+toX(n-1).toFixed(1)+'" y2="'+toY(sl*(n-1)+ic).toFixed(1)+'" stroke="#2ecc71" stroke-width="1.5" stroke-dasharray="4,3" opacity=".6"/>';
  }
  // Grid & Y labels
  const ySteps=4;
  let grids="";
  for(let i=0;i<=ySteps;i++){
    const v=+(mn+rng*i/ySteps).toFixed(1);
    const gy=toY(v).toFixed(1);
    grids+='<line x1="'+PL+'" y1="'+gy+'" x2="'+(W-PR2)+'" y2="'+gy+'" stroke="#1e1e30" stroke-width="1"/>';
    grids+='<text x="'+(PL-4)+'" y="'+(+gy+3)+'" text-anchor="end" font-size="7" fill="#636e72">'+v+'</text>';
  }
  // Ideal band
  const iy1=toY(iMax).toFixed(1),iy2=toY(iMin).toFixed(1);
  const idealBand='<rect x="'+PL+'" y="'+iy1+'" width="'+cW+'" height="'+(+iy2-+iy1)+'" fill="#fdcb6e" opacity=".07"/>'
    +'<line x1="'+PL+'" y1="'+iy1+'" x2="'+(W-PR2)+'" y2="'+iy1+'" stroke="#fdcb6e" stroke-width="1" stroke-dasharray="3,3" opacity=".5"/>'
    +'<line x1="'+PL+'" y1="'+iy2+'" x2="'+(W-PR2)+'" y2="'+iy2+'" stroke="#fdcb6e" stroke-width="1" stroke-dasharray="3,3" opacity=".4"/>'
    +'<text x="'+(W-PR2-2)+'" y="'+(+iy1-2)+'" text-anchor="end" font-size="6" fill="#fdcb6e" opacity=".8">Ideal '+iMin+'–'+iMax+'</text>';
  // Target line
  const hasTarget=!!(targetW&&data.length>=1);
  const tY=hasTarget?toY(targetW):0;
  const targetLine=hasTarget
    ?'<line x1="'+PL+'" y1="'+tY.toFixed(1)+'" x2="'+(W-PR2)+'" y2="'+tY.toFixed(1)+'" stroke="#a29bfe" stroke-width="1.5" stroke-dasharray="5,3" opacity=".8"/>'
     +'<text x="'+(W-PR2-2)+'" y="'+(tY-3).toFixed(1)+'" text-anchor="end" font-size="6.5" fill="#a29bfe">Obj '+targetW+'kg</text>'
    :"";
  // Area
  const areaClose=" L"+pts[pts.length-1].x.toFixed(1)+","+(PT+cH)+" L"+pts[0].x.toFixed(1)+","+(PT+cH)+" Z";
  const area=data.length>1
    ?'<path d="'+pathD+areaClose+'" fill="url(#rg)" />'
    :'<circle cx="'+pts[0].x.toFixed(1)+'" cy="'+pts[0].y.toFixed(1)+'" r="16" fill="url(#rg)"/>';
  // Projection dash
  const lastPt=pts[pts.length-1];
  const projDash=hasTarget&&lastPt
    ?'<line x1="'+lastPt.x.toFixed(1)+'" y1="'+lastPt.y.toFixed(1)+'" x2="'+(PL+cW).toFixed(1)+'" y2="'+tY.toFixed(1)+'" stroke="#a29bfe" stroke-width="1.5" stroke-dasharray="4,3" opacity=".5"/>'
     +'<circle cx="'+(PL+cW).toFixed(1)+'" cy="'+tY.toFixed(1)+'" r="5" fill="#a29bfe" opacity=".85"/>'
     +'<text x="'+(PL+cW-2).toFixed(1)+'" y="'+(tY-8).toFixed(1)+'" text-anchor="end" font-size="10" fill="#a29bfe">🎯</text>'
    :"";
  // Data point circles
  let circles="";
  pts.forEach((p,i)=>{
    const isFirst=i===0,isLast=i===pts.length-1;
    const showLbl=isFirst||isLast||pts.length<=5;
    const prev=i>0?pts[i-1]:null;
    const diff2=prev?+(p.d.weight-prev.d.weight).toFixed(1):null;
    const arrow=diff2===null?"":diff2<0?"▼":diff2>0?"▲":"—";
    const ac=diff2===null?"#74b9ff":diff2<0?"#2ecc71":diff2>0?"#ff6b6b":"#888";
    circles+='<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="'+(isLast?5:3)+'" fill="'+(isLast?"#74b9ff":"#0d1520")+'" stroke="#74b9ff" stroke-width="'+(isLast?2:1.5)+'"/>';
    if(showLbl)circles+='<text x="'+p.x.toFixed(1)+'" y="'+(p.y-9).toFixed(1)+'" text-anchor="middle" font-size="8" fill="#e8e8f0" font-weight="'+(isLast?"bold":"normal")+'">'+p.d.weight+'</text>';
    if(diff2!==null&&showLbl)circles+='<text x="'+p.x.toFixed(1)+'" y="'+(p.y-18).toFixed(1)+'" text-anchor="middle" font-size="7" fill="'+ac+'">'+arrow+Math.abs(diff2)+'</text>';
  });
  // X date labels
  let dateLabels="";
  pts.filter((_,i)=>i===0||i===pts.length-1||pts.length<=4).forEach(p=>{
    dateLabels+='<text x="'+p.x.toFixed(1)+'" y="'+(H-5)+'" text-anchor="middle" font-size="6.5" fill="#636e72">'+p.d.dateLabel+'</text>';
  });
  // Line
  const line=data.length>1?'<path d="'+pathD+'" fill="none" stroke="#74b9ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>':""
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox","0 0 "+W+" "+H);
  svg.style.cssText="width:100%;height:185px;overflow:visible;";
  svg.innerHTML='<defs><linearGradient id="rg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#74b9ff" stop-opacity=".3"/><stop offset="100%" stop-color="#74b9ff" stop-opacity="0"/></linearGradient></defs>'+grids+idealBand+targetLine+trendPath+area+line+projDash+circles+dateLabels;
  return svg;
}

      inputs[f.key]=inp;d2.appendChild(inp);fc.appendChild(d2);
    });
    const ta=h("textarea",{class:"ta",placeholder:"Notas personales, motivación, estrategia...",rows:"3"});
    ta.value=CH.notes||"";ta.oninput=()=>CH.notes=ta.value;fc.appendChild(ta);
    const sb=h("button",{class:"bp"},["🎯 Activar Reto"]);

  su.onclick=()=>{DD.steps=+si.value;saveDay();renderProfile();renderHome();toast("👟 "+DD.steps.toLocaleString()+" pasos guardados");};
  sr.append(h("span",{style:{fontSize:"14px",fontWeight:"600",color:"var(--tx2)"}},[" Pasos hoy:"]),si);
  stc.appendChild(sr);stc.appendChild(su);
  const stcNote=h("div",{style:{fontSize:"10px",color:"var(--tx3)",marginTop:"8px"}},["💡 Introduce los pasos de tu reloj o app de salud y pulsa Guardar."]);
  stc.appendChild(stcNote);
  el.appendChild(stc);

  // Goal settings
  const gc=card([]);
  gc.innerHTML=`<div style="font-size:14px;font-weight:700;margin-bottom:8px">🎯 Objetivo calórico</div>`;
  const GOALS=isMale()?GOALS_M:GOALS_F;
  Object.entries(GOALS).forEach(([key,g2])=>{
    const opt=h("div",{class:"gopt"+(GL.type===key?" on":"")});
    opt.innerHTML=`<div style="font-weight:700;font-size:14px">${g2.label}</div><div style="font-size:11px;color:var(--tx3)">${g2.desc}</div>${key!=="custom"?`<div style="font-size:18px;font-weight:800;color:var(--pur);margin-top:4px">${g2.cal} kcal</div>`:""}`;
    opt.onclick=()=>{GL.type=key;saveAll();renderProfile();renderHome();renderHeader();};
    gc.appendChild(opt);
  });
  if(GL.type==="custom"){
    const cr=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",justifyContent:"center",marginTop:"8px"}});
    const qm=h("button",{class:"qb"},["−"]);
    const qi=h("input",{class:"qi",type:"number",style:{width:"80px",fontSize:"18px"}});qi.value=GL.customCal||(isMale()?2000:1700);
    const qp=h("button",{class:"qb"},["+"]);
    qm.onclick=()=>{GL.customCal=Math.max(800,(GL.customCal||1700)-50);qi.value=GL.customCal;saveAll();renderHome();renderHeader();};
    qp.onclick=()=>{GL.customCal=Math.min(5000,(GL.customCal||1700)+50);qi.value=GL.customCal;saveAll();renderHome();renderHeader();};
    qi.oninput=e=>{GL.customCal=+e.target.value;saveAll();renderHome();renderHeader();};
    cr.append(qm,qi,h("span",{style:{fontSize:"12px",color:"var(--tx3)"}},[" kcal/día"]),qp);
    gc.appendChild(cr);
  }
  el.appendChild(gc);

  // Export/Import
  const exc=card([]);
  exc.innerHTML=`<div style="font-size:14px;font-weight:700;margin-bottom:8px">💾 Datos</div>`;
  const expBtn=h("button",{class:"bs",style:{marginBottom:"8px"}},["📤 Exportar mis datos"]);
  expBtn.onclick=()=>{
    const data={profile:PR,goal:GL,cycle:CY,body:BL,challenge:CH,customFoods:CF,exportDate:new Date().toISOString()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download="nutritrack_backup_"+td()+".json";a.click();URL.revokeObjectURL(url);
    toast("📤 Backup descargado");
  };
  const impBtn=h("button",{class:"bs"},["📥 Importar datos"]);
  const impInput=h("input",{type:"file",accept:".json",style:{display:"none"}});
  impInput.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{const d=JSON.parse(ev.target.result);
        if(d.profile)PR=d.profile;if(d.goal)GL=d.goal;if(d.cycle)CY=d.cycle;
        if(d.body)BL=d.body;if(d.challenge)CH=d.challenge;if(d.customFoods)CF=d.customFoods;
        saveAll();render();toast("📥 Datos importados correctamente");
      }catch{toast("❌ Error al importar el archivo");}
    };r.readAsText(f);
  };
  impBtn.onclick=()=>impInput.click();
  exc.append(expBtn,impBtn,impInput);
  exc.innerHTML+=`<div style="font-size:10px;color:var(--tx3);margin-top:8px">Los datos se guardan en este dispositivo. Exporta regularmente para hacer backup.</div>`;
  el.appendChild(exc);
}

// ══════ AI ══════
async function analyzeImage(file){
  AI_LOADING=true;renderFood();
  const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:file.type,data:b64}},
        {type:"text",text:`Analiza esta imagen de comida/plato. Identifica cada alimento visible y estima calorías y macros totales. Responde SOLO con JSON válido sin backticks: {"description":"descripción breve del plato en español","items":[{"name":"nombre en español","qty_g":gramos_estimados,"cal":kcal,"prot":g,"carbs":g,"fat":g}],"totals":{"cal":total_kcal,"prot":total_g,"carbs":total_g,"fat":total_g}}`}
      ]}]})
    });
    const data=await resp.json();
    const text=data.content?.find(x=>x.type==="text")?.text||"{}";
    AI_RES=JSON.parse(text.replace(/```json|```/g,"").trim());
  }catch(e){toast("❌ Error: "+e.message+". Comprueba la conexión.");}
  AI_LOADING=false;renderFood();
}

// ══════ TABS ══════
function switchTab(tab){
  CT=tab;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.tab===tab));
  document.querySelectorAll("[id^='tab-']").forEach(t=>t.style.display="none");
  document.getElementById("tab-"+tab).style.display="flex";
  document.getElementById("scr").scrollTop=0;
  render();
}

function render(){
  renderHeader();
  if(CT==="home")renderHome();
  else if(CT==="food")renderFood();
  else if(CT==="water")renderWater();
  else if(CT==="exercise")renderExercise();
  else if(CT==="body")renderBody();
  else if(CT==="challenge")renderChallenge();
  else if(CT==="cycle")renderCycle();
  else if(CT==="profile")renderProfile();
}

// ══════ EVENTS ══════
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>switchTab(t.dataset.tab)));
document.getElementById("prev-day").onclick=()=>{const d=new Date(AD+"T12:00:00");d.setDate(d.getDate()-1);AD=d.toISOString().split("T")[0];DD=S.gd(AD)||dDay();render();};
document.getElementById("next-day").onclick=()=>{const d=new Date(AD+"T12:00:00");d.setDate(d.getDate()+1);const nk=d.toISOString().split("T")[0];if(nk<=td()){AD=nk;DD=S.gd(AD)||dDay();render();}};
document.getElementById("goal-ov").onclick=e=>{if(e.target===document.getElementById("goal-ov"))document.getElementById("goal-ov").style.display="none";};
document.getElementById("ex-ov").onclick=e=>{if(e.target===document.getElementById("ex-ov")){EXMOD=null;document.getElementById("ex-ov").style.display="none";}};

// ══════ PWA INSTALL ══════
let dP=null;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();dP=e;if(!localStorage.getItem("nt2_ib_dismissed"))document.getElementById("install-banner").style.display="block";});
document.getElementById("install-btn").onclick=async()=>{if(dP){dP.prompt();await dP.userChoice;dP=null;document.getElementById("install-banner").style.display="none";}};
document.getElementById("install-close").onclick=()=>{document.getElementById("install-banner").style.display="none";localStorage.setItem("nt2_ib_dismissed","1");};

// ══════ SERVICE WORKER (offline) ══════
if("serviceWorker" in navigator){
  const sw=`const C="nt2-v1";self.addEventListener("install",e=>e.waitUntil(caches.open(C).then(c=>c.addAll([self.location.href]))));self.addEventListener("fetch",e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match(e.request)))));`;
  const blob=new Blob([sw],{type:"application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

if(!PR.name&&!S.g("profile")){
  setTimeout(()=>{
    const msg=confirm("¡Bienvenida/o a NutriTrack! 🥗\n\n¿Eres hombre o mujer?\n\nPulsa OK para Mujer, Cancelar para Hombre");
    PR.sex=msg?"female":"male";saveAll();renderProfile();switchTab("profile");
  },500);
}

render();
