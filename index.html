<style>
:root {
  --bg: #0a0a12;
  --bg2: #12121e;
  --bg3: #1a1a2e;
  --bg4: #1e1e2e;
  --border: #2d2d4d;
  --border2: #1e1e30;
  --text: #e8e8f0;
  --text2: #b2bec3;
  --text3: #636e72;
  --text4: #4a5568;
  --blue: #74b9ff;
  --purple: #a29bfe;
  --pink: #fd79a8;
  --yellow: #fdcb6e;
  --orange: #ff9f43;
  --green: #2ecc71;
  --red: #ff6b6b;
  --accent: #6c5ce7;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}

body {
  font-family:'DM Sans',sans-serif;
  color:var(--text);
  max-width:480px;
  margin:0 auto;
  position:relative;
  height:100%;
  display:flex;
  flex-direction:column;
}

input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.5;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* HEADER */
#header {
  background:linear-gradient(160deg,#0f0c29,#1a1a3e,#0f3460);
  padding:calc(var(--safe-top) + 14px) 16px 10px;
  border-bottom:1px solid var(--border2);
  flex-shrink:0;
}
.h-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.h-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--blue);font-size:20px;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.h-date{font-size:9px;color:var(--blue);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:2px;}
.h-title{font-size:22px;font-weight:800;background:linear-gradient(135deg,var(--blue),var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.h-chips{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:6px;}
.h-chip{font-size:11px;font-weight:600;cursor:pointer;}

/* TABS */
#tabs {
  display:flex;
  background:#0d0d1a;
  border-bottom:1px solid var(--border2);
  flex-shrink:0;
}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:7px 1px;background:none;border:none;color:var(--text4);cursor:pointer;font-size:8px;font-weight:700;letter-spacing:.3px;font-family:inherit;}
.tab .ti{font-size:16px;}
.tab.on{color:var(--blue);border-bottom:2px solid var(--blue);background:#0d1520;}

/* SCROLL AREA */
#scroll {
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding:10px 10px calc(var(--safe-bottom) + 10px);
}

/* CARDS */
.col{display:flex;flex-direction:column;gap:10px;}
.card{background:var(--bg2);border-radius:14px;padding:14px;border:1px solid var(--border2);}
.card.dark{background:#0d1520;border-color:#1e3a5f;}

/* TYPOGRAPHY */
.t-bold{font-size:14px;font-weight:700;}
.t-sm{font-size:11px;color:var(--text3);}
.t-blue{color:var(--blue);}
.row-b{display:flex;justify-content:space-between;align-items:center;}

/* BARS */
.bar-bg{background:var(--bg4);border-radius:20px;height:7px;overflow:hidden;margin-top:2px;}
.bar-fill{height:100%;border-radius:20px;transition:width .6s cubic-bezier(.4,0,.2,1);}

/* INPUTS */
.inp,.sel,.ta{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text);font-size:13px;outline:none;margin-bottom:8px;font-family:inherit;}
.ta{resize:none;line-height:1.5;}

/* BUTTONS */
.btn-p{width:100%;background:linear-gradient(135deg,var(--accent),var(--purple));border:none;border-radius:12px;padding:12px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;}
.btn-s{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:12px;padding:10px;color:var(--text2);font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;}
.rmv{background:none;border:none;color:var(--text4);cursor:pointer;font-size:13px;padding:4px;}

/* NUMERIC */
.qb{background:var(--border);border:none;border-radius:8px;color:var(--text);width:32px;height:32px;font-size:18px;cursor:pointer;flex-shrink:0;}
.qi{width:60px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:4px 6px;color:var(--text);font-size:15px;text-align:center;outline:none;font-family:inherit;}

/* BADGE */
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;}
.b-good{background:#2ecc7122;color:var(--green);}
.b-bad{background:#ff6b6b22;color:var(--red);}

/* TOAST */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--accent);border-radius:20px;padding:9px 20px;font-size:13px;font-weight:600;z-index:300;color:var(--text);box-shadow:0 8px 40px #0009;white-space:nowrap;max-width:90vw;opacity:0;transition:opacity .3s;pointer-events:none;}
#toast.show{opacity:1;}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:#000000cc;display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;}
.modal{background:var(--bg2);border-radius:20px;padding:24px;width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px;border:1px solid var(--border);text-align:center;max-height:90vh;overflow-y:auto;}

/* DROPDOWN */
.drop{background:var(--bg3);border:1px solid var(--border);border-radius:10px;margin-top:2px;overflow:hidden;max-height:220px;overflow-y:auto;}
.drop-row{padding:9px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border2);}

/* MISC */
.empty{text-align:center;color:var(--text3);padding:36px;font-size:13px;line-height:2.2;}
.icard{background:var(--bg4);border-radius:12px;padding:12px;text-align:center;}
.w-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 12px;color:var(--text);cursor:pointer;min-width:60px;font-family:inherit;}
.ex-card{background:var(--bg3);border-radius:12px;padding:10px;cursor:pointer;border:1px solid var(--border);}
.u-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:5px 10px;color:var(--text3);font-size:12px;cursor:pointer;font-family:inherit;}
.u-btn.on{background:#0d1520;border-color:var(--blue);color:var(--blue);}
.f-btn{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:5px 12px;color:var(--text3);font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit;}
.f-btn.on{background:#0d1520;border-color:var(--blue);color:var(--blue);}
.m-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:2px solid transparent;border-radius:10px;padding:6px 3px;cursor:pointer;}
.m-btn.on{border-color:var(--blue);background:#0d1520;}
.goal-opt{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;text-align:left;margin-bottom:8px;}
.goal-opt.on{border-color:var(--purple);background:#1a1030;}

/* Grid 2 */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* install banner */
#install-banner{display:none;position:fixed;bottom:calc(var(--safe-bottom) + 10px);left:10px;right:10px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:16px;padding:14px 16px;z-index:100;box-shadow:0 8px 40px #6c5ce766;}
#install-banner .ib-text{font-size:13px;font-weight:600;}
#install-banner .ib-sub{font-size:11px;opacity:.7;margin-top:2px;}
.ib-row{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.ib-btn{background:#fff3;border:1px solid #fff5;border-radius:10px;padding:7px 14px;color:#fff;font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit;}
.ib-close{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;opacity:.7;}
</style>
</head>

function today(){return new Date().toISOString().split("T")[0];}
function defaultDay(){return{water:0,meals:[],exercises:[],mood:null,energy:null,note:""};}
function fmtDate(d){return new Date(d+"T12:00:00").toLocaleDateString("es-ES",{day:"numeric",month:"short",year:"2-digit"});}
function pct(v,g){return Math.min(100,Math.round((v/g)*100));}
function calcIMC(kg){return+(kg/(HEIGHT_M*HEIGHT_M)).toFixed(1);}
function imcCat(v){return v<18.5?{l:"Bajo peso",c:"#74b9ff"}:v<25?{l:"Normopeso ✓",c:"#2ecc71"}:v<30?{l:"Sobrepeso",c:"#fdcb6e"}:{l:"Obesidad",c:"#ff6b6b"};}
function estFat(imc){return+((1.20*imc)+(0.23*AGE)-5.4).toFixed(1);}
function idealRange(){const i=HEIGHT_CM-100-((HEIGHT_CM-150)/2);return{min:+(i-3).toFixed(1),max:+(i+3).toFixed(1)};}
function whrCalc(w,h){return w&&h?{ratio:+(w/h).toFixed(2),risk:w/h>=0.85?"⚠️ Riesgo":"✅ Normal"}:null;}

function getCalFactor(food,qty,unit){
  if(!unit||unit==="g"||unit==="ml")return qty/100;
  if(unit==="unidad"||unit==="ración")return qty;
  if(unit==="taza")return qty*2.4;
  if(unit==="puñado")return qty*0.3;
  if(unit==="plato")return qty*3;
  if(unit==="rebanada")return qty*0.3;
  if(unit==="cucharada")return qty*0.15;
  return qty/100;
}

function calGoal(){return goal.type==="custom"?goal.customCal:(GOALS[goal.type]?.cal||1550);}
function totals(){return dayData.meals.reduce((a,m)=>({cal:a.cal+m.cal,prot:a.prot+m.prot,carbs:a.carbs+m.carbs,fat:a.fat+m.fat}),{cal:0,prot:0,carbs:0,fat:0});}
function exCalBurned(){return dayData.exercises.reduce((a,e)=>a+e.cal_burned,0);}
function allFoods(){return[...FOOD_DB,...customFoods];}

function cycleDay(){
  if(!cycle.lastPeriod)return null;
  const diff=Math.floor((new Date(activeDate)-new Date(cycle.lastPeriod))/86400000)+1;
  return((diff-1)%cycle.cycleLen)+1;
}
function currentPhase(){
  const d=cycleDay();if(!d)return null;
  if(d<=5)return CYCLE_PHASES[0];
  if(d<=13)return CYCLE_PHASES[1];
  if(d<=16)return CYCLE_PHASES[2];
  return CYCLE_PHASES[3];
}

function isToday(){return activeDate===today();}

// ══════════════════════════════════
// RENDER ENGINE
// ══════════════════════════════════
function h(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object"){Object.assign(el.style,v);}
    else if(k.startsWith("on"))el[k]=v;
    else if(k==="class")el.className=v;
    else el.setAttribute(k,v);
  });
  if(children){
    (Array.isArray(children)?children:[children]).forEach(c=>{
      if(c==null)return;
      el.appendChild(typeof c==="string"?document.createTextNode(c):c);
    });
  }
  return el;
}
function hh(html){const d=document.createElement("div");d.innerHTML=html;return d.firstChild;}
function div(cls,children){return h("div",{class:cls},children);}
function card(children,extra=""){
  const d=document.createElement("div");
  d.className="card "+extra;
  (Array.isArray(children)?children:[children]).forEach(c=>{if(c)d.appendChild(typeof c==="string"?document.createTextNode(c):c);});
  return d;
}

function barEl(val,color){
  const bg=div("bar-bg");
  const fill=div("bar-fill");
  fill.style.width=val+"%";
  fill.style.background=color;
  bg.appendChild(fill);
  return bg;
}

function icard(label,value,sub,color){
  const d=div("icard");
  d.innerHTML=`<div style="font-size:10px;color:var(--text3);margin-bottom:3px">${label}</div><div style="font-size:18px;font-weight:800;color:${color}">${value}</div>${sub?`<div style="font-size:10px;color:var(--text3);margin-top:3px;line-height:1.3">${sub}</div>`:""}`;
  return d;
}

function renderFoodSearch(container,inputEl){
  const old=container.querySelector(".drop");
  if(old)old.remove();
  const sf=container.querySelector(".food-sel");
  if(sf)sf.remove();

  if(!foodSearch){return;}

  if(!selFood){
    const drop=div("drop");
    const filtered=allFoods().filter(f=>f.name.toLowerCase().includes(foodSearch.toLowerCase())).slice(0,10);
    if(filtered.length===0){
      drop.innerHTML=`<div style="padding:10px 14px;color:var(--text3);font-size:12px">Sin resultados. Prueba "Crear alimento"</div>`;
    } else {
      filtered.forEach(f=>{
        const row=div("drop-row");
        row.innerHTML=`<div><span style="font-size:13px">${f.name}</span><span style="font-size:10px;color:var(--text3);margin-left:6px">${f.cat}</span></div><span style="color:var(--blue);font-size:12px">${f.cal}kcal/100g</span>`;
        row.onclick=()=>{selFood=f;foodSearch=f.name;foodUnit=f.units[0];foodQty=(f.units[0]==="g"||f.units[0]==="ml")?100:1;inputEl.value=f.name;renderFoodSearch(container,inputEl);};
        drop.appendChild(row);
      });
    }
    container.appendChild(drop);
  } else {
    const factor=getCalFactor(selFood,foodQty,foodUnit);
    const sd=h("div",{class:"food-sel",style:{background:"var(--bg3)",borderRadius:"12px",padding:"14px",marginTop:"4px",border:"1px solid var(--border)"}});
    sd.innerHTML=`<div style="font-weight:700;margin-bottom:4px">${selFood.name}</div>
    <div style="font-size:11px;color:var(--blue);margin-bottom:10px">${Math.round(selFood.cal*factor)} kcal · P:${Math.round(selFood.prot*factor*10)/10}g</div>`;
    
    const uRow=h("div",{style:{display:"flex",gap:"8px",marginBottom:"10px",flexWrap:"wrap"}});
    selFood.units.forEach(u=>{
      const btn=h("button",{class:"u-btn"+(foodUnit===u?" on":"")},[u]);
      btn.onclick=()=>{foodUnit=u;foodQty=(u==="g"||u==="ml")?100:1;renderFoodSearch(container,inputEl);};
      uRow.appendChild(btn);
    });
    sd.appendChild(uRow);

    const qRow=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}});
    const qMinus=h("button",{class:"qb"},["−"]);
    const qInput=h("input",{class:"qi",type:"number"});
    qInput.value=foodQty;
    qInput.oninput=(e)=>{foodQty=+e.target.value;renderFoodSearch(container,inputEl);};
    const qUnit=h("span",{style:{fontSize:"12px",color:"var(--text3)",minWidth:"30px"}},[foodUnit]);
    const qPlus=h("button",{class:"qb"},["+"]);
    const step=(foodUnit==="g"||foodUnit==="ml")?10:1;
    qMinus.onclick=()=>{foodQty=Math.max(1,foodQty-step);renderFoodSearch(container,inputEl);};
    qPlus.onclick=()=>{foodQty+=step;renderFoodSearch(container,inputEl);};
    qRow.append(qMinus,qInput,qUnit,qPlus);
    sd.appendChild(qRow);

    const addBtn=h("button",{class:"btn-p"},["Añadir ✓"]);
    addBtn.onclick=()=>{
      const f=getCalFactor(selFood,foodQty,foodUnit);
      const e={id:Date.now(),name:selFood.name,qty:foodQty,unit:foodUnit,time:mealTime,
        cal:Math.round(selFood.cal*f),prot:Math.round(selFood.prot*f*10)/10,carbs:Math.round(selFood.carbs*f*10)/10,fat:Math.round(selFood.fat*f*10)/10};
      dayData.meals.push(e);saveDay();selFood=null;foodSearch="";
      renderFood();renderHome();showToast("✅ "+e.name+" ("+e.cal+" kcal)");
    };
    sd.appendChild(addBtn);
    container.appendChild(sd);
  }
}

function renderExModal(){
  if(!exModal){document.getElementById("ex-modal").style.display="none";return;}
  const mc=document.getElementById("ex-modal-content");
  mc.innerHTML="";
  const cal=Math.round(exModal.cal*exMins);
  mc.innerHTML=`<div style="font-size:44px">${exModal.icon}</div>
  <div style="font-size:18px;font-weight:800">${exModal.name}</div>
  <div style="font-size:11px;color:var(--blue);text-transform:uppercase;letter-spacing:1px">${exModal.cat}</div>`;

  const row=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",justifyContent:"center"}});
  const minus=h("button",{class:"qb"},["−"]);
  const inp=h("input",{class:"qi",type:"number"});inp.value=exMins;
  const plus=h("button",{class:"qb"},["+"]);;
  const calDisp=h("div",{style:{fontSize:"26px",fontWeight:"800",color:"var(--orange)"}},["≈ "+cal+" kcal"]);
  minus.onclick=()=>{exMins=Math.max(5,exMins-5);inp.value=exMins;calDisp.textContent="≈ "+Math.round(exModal.cal*exMins)+" kcal";};
  plus.onclick=()=>{exMins+=5;inp.value=exMins;calDisp.textContent="≈ "+Math.round(exModal.cal*exMins)+" kcal";};
  inp.oninput=(e)=>{exMins=+e.target.value;calDisp.textContent="≈ "+Math.round(exModal.cal*exMins)+" kcal";};
  row.append(minus,inp,h("span",{style:{fontSize:"12px",color:"var(--text3)",minWidth:"30px"}},["min"]),plus);

  const addBtn=h("button",{class:"btn-p"},["Registrar 🔥"]);
  addBtn.onclick=()=>{
    const calB=Math.round(exModal.cal*exMins);
    dayData.exercises.push({...exModal,mins:exMins,cal_burned:calB,id:Date.now()});
    saveDay();exModal=null;document.getElementById("ex-modal").style.display="none";
    renderExercise();renderHome();showToast("🔥 "+calB+" kcal quemadas");
  };
  const cancelBtn=h("button",{class:"btn-s"},["Cancelar"]);
  cancelBtn.onclick=()=>{exModal=null;document.getElementById("ex-modal").style.display="none";};

  mc.append(row,calDisp,addBtn,cancelBtn);
  document.getElementById("ex-modal").style.display="flex";
}

    const hc=card([]);

    [...bodyLog].reverse().forEach(e=>{
      const row=h("div",{style:{padding:"9px 0",borderBottom:"1px solid var(--bg3)"}});
      row.innerHTML=`<div class="row-b" style="margin-bottom:4px"><span style="font-weight:700;font-size:13px">${e.dateLabel}</span><div style="display:flex;gap:8px"><span style="color:var(--blue);font-weight:700">${e.weight}kg</span><span style="color:${imcCat(e.imc).c};font-weight:700">IMC ${e.imc}</span></div></div>
      ${e.waist||e.hip?`<div style="font-size:10px;color:var(--text3);display:flex;flex-wrap:wrap;gap:8px">${e.waist?`<span>Cin:${e.waist}</span>`:""} ${e.hip?`<span>Cad:${e.hip}</span>`:""} ${e.chest?`<span>Pec:${e.chest}</span>`:""}</div>`:""}`;
      hc.appendChild(row);
    });
    el.appendChild(hc);

    const delBtn=h("button",{class:"btn-s",style:{color:"var(--red)",borderColor:"#ff6b6b33"}},["🗑️ Borrar último"]);
    delBtn.onclick=()=>{if(confirm("¿Borrar último registro?")){bodyLog=bodyLog.slice(0,-1);saveAll();renderBody();}};
    el.appendChild(delBtn);
  }
}

function miniChart(data){
  const ws=data.map(d=>d.weight),mn=Math.min(...ws)-1,mx=Math.max(...ws)+1,rng=mx-mn||1;
  const W=300,H=80,P=16;
  const pts=data.map((d,i)=>({x:P+(i/Math.max(data.length-1,1))*(W-P*2),y:H-P-((d.weight-mn)/rng)*(H-P*2),d}));
  const path=pts.map((p,i)=>`${i===0?"M":"L"}${p.x},${p.y}`).join(" ");
  const svgEl=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svgEl.setAttribute("viewBox",`0 0 ${W} ${H}`);svgEl.style.cssText="width:100%;height:80px;";
  svgEl.innerHTML=`<defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#74b9ff" stop-opacity=".3"/><stop offset="100%" stop-color="#74b9ff" stop-opacity="0"/></linearGradient></defs>
  <path d="${path} L${pts[pts.length-1].x},${H} L${pts[0].x},${H} Z" fill="url(#wg)"/>
  <path d="${path}" fill="none" stroke="#74b9ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  ${pts.map((p,i)=>`<circle cx="${p.x}" cy="${p.y}" r="3" fill="#74b9ff"/><text x="${p.x}" y="${p.y-6}" text-anchor="middle" font-size="8" fill="#e8e8f0">${p.d.weight}</text>`).join("")}
  <text x="${P}" y="${H-2}" font-size="8" fill="#636e72">${data[0]?.dateLabel}</text>
  ${data.length>1?`<text x="${W-P}" y="${H-2}" text-anchor="end" font-size="8" fill="#636e72">${data[data.length-1]?.dateLabel}</text>`:""}`;
  return svgEl;
}

// ══════════════════════════════════
// RENDER CYCLE
// ══════════════════════════════════
function renderCycle(){
  const el=document.getElementById("tab-cycle");
  el.innerHTML="";
  const phase=currentPhase(),cd=cycleDay();

  const mc=card([]);
  mc.innerHTML=`<div class="t-bold" style="margin-bottom:8px">🌙 Ciclo menstrual</div>`;
  const g=h("div",{class:"g2",style:{marginBottom:"12px"}});
  
  const d1=h("div");
  d1.innerHTML=`<label style="font-size:11px;color:var(--text2);display:block;margin-bottom:4px">Inicio último período</label>`;
  const lpi=h("input",{class:"inp",type:"date",style:{marginBottom:"0"}});
  lpi.value=cycle.lastPeriod;lpi.max=today();
  lpi.onchange=(e)=>{cycle.lastPeriod=e.target.value;saveAll();renderCycle();renderHeader();};
  d1.appendChild(lpi);

  const d2=h("div");
  d2.innerHTML=`<label style="font-size:11px;color:var(--text2);display:block;margin-bottom:4px">Duración ciclo (días)</label>`;
  const cli=h("input",{class:"inp",type:"number",style:{marginBottom:"0"}});
  cli.value=cycle.cycleLen;cli.min=21;cli.max=35;
  cli.oninput=(e)=>{cycle.cycleLen=+e.target.value;saveAll();renderCycle();};
  d2.appendChild(cli);
  g.append(d1,d2);mc.appendChild(g);

  if(cycle.lastPeriod){
    const dayBox=h("div",{style:{padding:"14px",background:"var(--bg4)",borderRadius:"12px",marginBottom:"12px",textAlign:"center"}});
    dayBox.innerHTML=`<div style="font-size:13px;color:var(--text3);margin-bottom:4px">Día del ciclo actual</div>
    <div style="font-size:40px;font-weight:800;color:${phase?.color||"var(--blue)"}">${cd}</div>
    <div style="font-size:11px;color:var(--text3)">de ${cycle.cycleLen} días</div>`;
    mc.appendChild(dayBox);

    const phaseBar=h("div",{style:{display:"flex",borderRadius:"12px",overflow:"hidden",marginBottom:"12px"}});
    CYCLE_PHASES.forEach((p,i)=>{
      const active=phase?.name===p.name;
      const d=h("div",{style:{flex:i===2?3:i===0?5:i===1?8:12,background:active?p.color:p.color+"44",display:"flex",alignItems:"center",justifyContent:"center",padding:"8px 2px"}});
      d.innerHTML=`<span style="font-size:16px">${p.icon}</span>`;
      phaseBar.appendChild(d);
    });
    mc.appendChild(phaseBar);

    if(phase){
      const ptip=h("div",{style:{padding:"12px",background:"#1a1028",borderRadius:"12px",border:`1px solid ${phase.color}44`}});
      ptip.innerHTML=`<div style="font-size:14px;font-weight:700;color:${phase.color};margin-bottom:4px">${phase.icon} ${phase.name} · Días ${phase.days}</div><div style="font-size:12px;color:var(--text2);line-height:1.6">${phase.tip}</div>`;
      mc.appendChild(ptip);
    }
  }
  el.appendChild(mc);

  const allc=card([]);
  allc.innerHTML=`<div class="t-bold" style="margin-bottom:10px">Las 4 fases</div>`;
  CYCLE_PHASES.forEach(p=>{
    const d=h("div",{style:{padding:"10px 0",borderBottom:"1px solid var(--bg3)"}});
    d.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:18px">${p.icon}</span><div><div style="font-size:13px;font-weight:700;color:${p.color}">${p.name}</div><div style="font-size:10px;color:var(--text3)">Días ${p.days}</div></div></div><div style="font-size:11px;color:var(--text2);line-height:1.6">${p.tip}</div>`;
    allc.appendChild(d);
  });
  el.appendChild(allc);
}

function renderGoalModal(){
  const mc=document.getElementById("goal-modal-content");
  mc.innerHTML=`<div style="font-size:20px;font-weight:800;margin-bottom:16px">🎯 Tu objetivo calórico</div>`;
  Object.entries(GOALS).forEach(([key,g])=>{
    const opt=h("div",{class:"goal-opt"+(goal.type===key?" on":"")});
    opt.innerHTML=`<div style="font-weight:700;font-size:14px">${g.label}</div><div style="font-size:11px;color:var(--text3)">${key==="custom"?goal.customCal+" kcal/día":g.desc}</div>${key!=="custom"?`<div style="font-size:18px;font-weight:800;color:var(--purple);margin-top:4px">${g.cal} kcal</div>`:""}`;
    opt.onclick=()=>{goal.type=key;saveAll();renderGoalModal();renderHome();renderHeader();};
    mc.appendChild(opt);
  });
  if(goal.type==="custom"){
    const row=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginTop:"10px",justifyContent:"center"}});
    const minus=h("button",{class:"qb"},["−"]);
    const inp=h("input",{class:"qi",type:"number",style:{width:"80px",fontSize:"18px"}});
    inp.value=goal.customCal;
    inp.oninput=(e)=>{goal.customCal=+e.target.value;saveAll();renderHome();};
    const plus=h("button",{class:"qb"},["+"]);;
    minus.onclick=()=>{goal.customCal=Math.max(1200,goal.customCal-50);inp.value=goal.customCal;saveAll();renderHome();};
    plus.onclick=()=>{goal.customCal=Math.min(3500,goal.customCal+50);inp.value=goal.customCal;saveAll();renderHome();};
    row.append(minus,inp,h("span",{style:{fontSize:"12px",color:"var(--text3)"}},[" kcal/día"]),plus);
    mc.appendChild(row);
  }
  const closeBtn=h("button",{class:"btn-p",style:{marginTop:"16px"}},["Guardar ✓"]);
  closeBtn.onclick=()=>{document.getElementById("goal-modal").style.display="none";renderHome();renderHeader();};
  mc.appendChild(closeBtn);
  document.getElementById("goal-modal").style.display="flex";
}

// AI IMAGE ANALYSIS
// ══════════════════════════════════
async function analyzeImage(file){
  aiLoading=true;renderFood();
  const b64=await new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=(e)=>res(e.target.result.split(",")[1]);
    r.onerror=()=>rej();
    r.readAsDataURL(file);
  });
  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:file.type,data:b64}},
        {type:"text",text:`Analiza esta imagen de comida. Identifica cada alimento visible y estima calorías y macros. Responde SOLO con JSON válido sin backticks ni texto extra: {"description":"descripción breve","items":[{"name":"nombre","qty_g":gramos,"cal":kcal,"prot":g,"carbs":g,"fat":g}],"totals":{"cal":total,"prot":total,"carbs":total,"fat":total}}`}
      ]}]})
    });
    const data=await resp.json();
    const text=data.content?.find(x=>x.type==="text")?.text||"{}";
    aiResult=JSON.parse(text.replace(/```json|```/g,"").trim());
  }catch{showToast("Error analizando imagen");}
  aiLoading=false;renderFood();
}

// TAB SWITCHING
// ══════════════════════════════════
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.tab===tab));
  document.querySelectorAll("[id^='tab-']").forEach(t=>t.style.display="none");
  document.getElementById("tab-"+tab).style.display="flex";
  document.getElementById("scroll").scrollTop=0;
  render();
}

function render(){
  renderHeader();
  if(currentTab==="home")renderHome();
  else if(currentTab==="food")renderFood();
  else if(currentTab==="water")renderWater();
  else if(currentTab==="exercise")renderExercise();
  else if(currentTab==="body")renderBody();
  else if(currentTab==="cycle")renderCycle();
}

  dayData=stor.getDay(activeDate)||defaultDay();

};

let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();deferredPrompt=e;
  const banner=document.getElementById("install-banner");
  if(!localStorage.getItem("nt_install_dismissed"))banner.style.display="block";
});

document.getElementById("install-btn").onclick=async()=>{
  if(deferredPrompt){
    deferredPrompt.prompt();
    const{outcome}=await deferredPrompt.userChoice;
    deferredPrompt=null;
    document.getElementById("install-banner").style.display="none";
  }
};
document.getElementById("install-close").onclick=()=>{
  document.getElementById("install-banner").style.display="none";
  localStorage.setItem("nt_install_dismissed","1");
};

// SERVICE WORKER
// ══════════════════════════════════
if("serviceWorker" in navigator){
  const swCode=`
const CACHE="nutritrack-v1";
const ASSETS=[self.location.href];
self.addEventListener("install",e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
self.addEventListener("fetch",e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match(e.request)))));
  `;
  const blob=new Blob([swCode],{type:"application/javascript"});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
